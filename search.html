<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — GeoHub</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#10b981">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="mobile-nav.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="search.css">
</head>
<body>

<div id="srToast"><i class="fas fa-check-circle"></i><span id="srToastMsg"></span></div>

<!-- ── TOP BAR ── -->
<div class="sr-topbar">
  <a href="javascript:history.back()" class="sr-back"><i class="fas fa-arrow-left"></i></a>
  <div class="sr-topbar-input-wrap">
    <i class="fas fa-search sr-topbar-icon"></i>
    <input class="sr-topbar-input" id="topbarInput" type="text" placeholder="Search GeoHub…" autocomplete="off" spellcheck="false">
    <i class="fas fa-times sr-topbar-clear" id="topbarClear" onclick="clearSearch()"></i>
  </div>
  <div class="sr-kbd-hint"><kbd>⌘K</kbd> anywhere</div>
</div>

<!-- ── PAGE ── -->
<div class="sr-page">

  <!-- HERO -->
  <div class="sr-hero" id="srHero">
    <div class="sr-hero-orb o1"></div>
    <div class="sr-hero-orb o2"></div>
    <div class="sr-hero-badge"><i class="fas fa-search"></i> Command Center</div>
    <h1 class="sr-hero-title">Search <span class="hl">Everything</span> on GeoHub</h1>
    <p class="sr-hero-sub">People · Places · Events · Businesses · Rewards · Challenges · Creators & more</p>

    <div class="sr-big-wrap">
      <i class="fas fa-search sr-big-icon"></i>
      <input class="sr-big-input" id="bigInput" type="text" placeholder="Search places, people, events, rewards…" autocomplete="off" spellcheck="false">
      <button class="sr-big-clear" id="bigClear" onclick="clearSearch()"><i class="fas fa-times"></i></button>
    </div>

    <div class="sr-hero-stats">
      <span class="sr-hstat"><i class="fas fa-database"></i> <strong>12,000+</strong> items indexed</span>
      <span class="sr-hstat"><i class="fas fa-bolt"></i> <strong>Instant</strong> results</span>
      <span class="sr-hstat"><i class="fas fa-shield-alt"></i> <strong>Trust-aware</strong> ranking</span>
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="sr-cats-bar">
    <div class="sr-cats-scroll" id="catTabs"></div>
  </div>

  <!-- FILTERS -->
  <div class="sr-filters-row" id="filtersRow">
    <button class="sr-filter active" data-filter="all" onclick="applyFilter(this,'all')"><i class="fas fa-list"></i> All</button>
    <button class="sr-filter" data-filter="verified" onclick="applyFilter(this,'verified')"><i class="fas fa-check-circle"></i> Verified</button>
    <button class="sr-filter" data-filter="hightrust" onclick="applyFilter(this,'hightrust')"><i class="fas fa-shield-alt"></i> High Trust</button>
    <button class="sr-filter" data-filter="tbilisi" onclick="applyFilter(this,'tbilisi')"><i class="fas fa-map-marker-alt"></i> Tbilisi</button>
    <button class="sr-filter" data-filter="batumi" onclick="applyFilter(this,'batumi')"><i class="fas fa-map-marker-alt"></i> Batumi</button>
    <button class="sr-filter" data-filter="nearby" onclick="applyFilter(this,'nearby')"><i class="fas fa-location-dot"></i> Nearby</button>
  </div>

  <!-- BODY -->
  <div class="sr-body">

    <!-- Empty / Landing state -->
    <div id="srEmptyState">
      <div class="sr-section-title" id="recentTitle" style="display:none"><i class="fas fa-clock"></i> Recent Searches</div>
      <div class="sr-recent-list" id="recentList"></div>

      <div class="sr-section-title"><i class="fas fa-fire"></i> Trending Now</div>
      <div class="sr-trending-grid" id="trendingGrid"></div>

      <div class="sr-section-title"><i class="fas fa-compass"></i> Quick Browse</div>
      <div class="sr-grid" id="quickBrowseGrid"></div>
    </div>

    <!-- Results -->
    <div id="srResults">
      <div class="sr-results-header">
        <span class="sr-results-count" id="resultsCount"></span>
      </div>
      <div class="sr-grid" id="resultsGrid"></div>
      <button class="sr-load-more" id="srLoadMore" onclick="loadMoreResults()" style="display:none">Load more results</button>
    </div>

  </div>
</div>

<script src="mock-users.js"></script>
<script src="data.js"></script>
<script src="search.js"></script>
<script src="mobile-nav.js"></script>
</body>
</html>
