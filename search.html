  <!-- TOP BAR -->
  <div class="sr-topbar">
    <a href="javascript:history.back()" class="sr-back" aria-label="Back"><i class="fas fa-arrow-left"></i></a>
    <div class="sr-topbar-input-wrap">
      <i class="fas fa-search sr-topbar-icon"></i>
      <input class="sr-topbar-input" id="srchInput" type="search"
             placeholder="Search people, places, businesses…"
             autocomplete="off" autocorrect="off" spellcheck="false">
      <button class="sr-topbar-clear" id="srchClear" aria-label="Clear"><i class="fas fa-times"></i></button>
    </div>
  </div>

  <!-- CATEGORY TABS -->
  <div class="sr-cats-bar">
    <div class="sr-cats-scroll" id="srchTabs"></div>
  </div>

  <!-- PAGE BODY -->
  <div class="sr-page">
    <div class="sr-body" id="srchBody"></div>
  </div>

  <script>
  (function () {
    'use strict';

    var RECENT_KEY = 'gh_recent_searches';
    var MAX_RECENT = 10;
    var _tab = 'all';
    var _lastResults = null;
    var _debounce = null;
    var _defaultTabCache = {};

    var TABS = [
      { id:'all',        label:'ყველა',       icon:'fas fa-th' },
      { id:'people',     label:'ადამიანები',  icon:'fas fa-user' },
      { id:'stories',    label:'სტორები',     icon:'fas fa-film' },
      { id:'hashtags',   label:'#ჰეშთეგები', icon:'fas fa-hashtag' },
      { id:'videos',     label:'ვიდეოები',    icon:'fas fa-play' },
      { id:'businesses', label:'ბიზნესი',     icon:'fas fa-store' },
      { id:'places',     label:'ადგილები',    icon:'fas fa-map-marker-alt' },
      { id:'events',     label:'ივენთები',    icon:'fas fa-calendar' },
      { id:'groups',     label:'ჯგუფები',     icon:'fas fa-users' },
      { id:'posts',      label:'პოსტები',     icon:'fas fa-newspaper' },
      { id:'services',   label:'სერვისები',   icon:'fas fa-grip' },
      { id:'creators',   label:'Creators',    icon:'fas fa-camera-retro' },
      { id:'learning',   label:'Learning',    icon:'fas fa-graduation-cap' }
    ];

    var TAB_KEY = {
      all:null, people:'users', videos:'videos', businesses:'businesses', places:'places',
      events:'events', groups:'groups', posts:'posts', services:'services',
      creators:'creators', learning:'learningItems', stories:'stories', hashtags:null
    };

    function esc(s) {
      return String(s || '').replace(/[&<>'"]/g, function(c) {
        return { '&':'&amp;','<':'&lt;','>':'&gt;',"'":'&#39;','"':'&quot;' }[c];
      });
    }

    /* ── Recent searches ── */
    function getRecent() {
      try { return JSON.parse(localStorage.getItem(RECENT_KEY) || '[]'); } catch(e) { return []; }
    }
    function _gfHistorySave(list) {
      var gfb = window.GeoFirebase;
      if(!gfb || !gfb.auth || !gfb.auth.currentUser) return;
      var uid = gfb.auth.currentUser.uid;
      var fsm = gfb.firestore || gfb.fs;
      var ddb = gfb.db;
      if(!fsm || !ddb || !fsm.updateDoc || !fsm.doc) return;
      fsm.updateDoc(fsm.doc(ddb, 'users', uid), { searchHistory: list }).catch(function(){});
    }
    function _gfHistoryLoad(callback) {
      var gfb = window.GeoFirebase;
      if(!gfb || !gfb.auth || !gfb.auth.currentUser) { callback(null); return; }
      var uid = gfb.auth.currentUser.uid;
      var fsm = gfb.firestore || gfb.fs;
      var ddb = gfb.db;
      if(!fsm || !ddb || !fsm.getDoc || !fsm.doc) { callback(null); return; }
      fsm.getDoc(fsm.doc(ddb, 'users', uid)).then(function(snap) {
        var data = snap.exists() ? (snap.data() || {}) : {};
        callback(Array.isArray(data.searchHistory) ? data.searchHistory : null);
      }).catch(function() { callback(null); });
    }
    function saveRecent(q) {
      var list = getRecent().filter(function(s) { return s !== q; });
      list.unshift(q);
      list = list.slice(0, MAX_RECENT);
      try { localStorage.setItem(RECENT_KEY, JSON.stringify(list)); } catch(e) {}
      _gfHistorySave(list);
    }
    function removeRecent(q) {
      var list = getRecent().filter(function(s) { return s !== q; });
      try { localStorage.setItem(RECENT_KEY, JSON.stringify(list)); } catch(e) {}
      _gfHistorySave(list);
    }
    function clearAllRecent() {
      try { localStorage.removeItem(RECENT_KEY); } catch(e) {}
      _gfHistorySave([]);
    }

    /* ── Tab management ── */
    function buildTabs() {
      var container = document.getElementById('srchTabs');
      if (!container) return;
      container.innerHTML = TABS.map(function(tab) {
        return '<button class="sr-cat-tab' + (tab.id === 'all' ? ' active' : '') + '" data-sr-tab="' + tab.id + '">' +
          '<i class="' + tab.icon + '"></i> ' + tab.label +
          '<span class="sr-cat-count" id="sr-cnt-' + tab.id + '" style="display:none">0</span>' +
          '</button>';
      }).join('');
      container.addEventListener('click', function(e) {
        var btn = e.target.closest('[data-sr-tab]');
        if (!btn) return;
        setTab(btn.dataset.srTab);
      });
    }

    function setTab(tabId) {
      _tab = tabId;
      document.querySelectorAll('.sr-cat-tab').forEach(function(t) {
        t.classList.toggle('active', t.dataset.srTab === tabId);
      });
      var q = document.getElementById('srchInput').value.trim();
      if (q && _lastResults) {
        renderResults(_lastResults, q);
      } else if (!q) {
        loadDefaultTab(tabId);
      }
    }

    function updateCounts(results) {
      var keyMap = {
        people:'users', videos:'videos', businesses:'businesses', places:'places', events:'events',
        groups:'groups', posts:'posts', services:'services', creators:'creators', learning:'learningItems'
      };
      var total = 0;
      Object.keys(keyMap).forEach(function(tabId) {
        var cnt = document.getElementById('sr-cnt-' + tabId);
        var n = (results[keyMap[tabId]] || []).length;
        total += n;
        if (cnt) { cnt.textContent = n; cnt.style.display = n ? 'inline' : 'none'; }
      });
      var allCnt = document.getElementById('sr-cnt-all');
      if (allCnt) { allCnt.textContent = total; allCnt.style.display = total ? 'inline' : 'none'; }
    }

    /* ── Discover state ── */
    var TRENDING_TOPICS = [
      { q:'თბილისი',  icon:'🏙️' }, { q:'ბათუმი',   icon:'🌊' },
      { q:'სვანეთი',  icon:'🏔️' }, { q:'Travel',    icon:'✈️'  },
      { q:'Food',     icon:'🍽️'  }, { q:'Hiking',    icon:'🥾'  },
      { q:'Culture',  icon:'🏛️' }, { q:'ღვინო',     icon:'🍷'  },
      { q:'Coffee',   icon:'☕'  }, { q:'ბუნება',    icon:'🌿'  },
      { q:'Music',    icon:'🎵'  }, { q:'Sports',    icon:'⚽'  }
    ];

    var QUICK_LINKS = [
      { label:'ადამიანები',  icon:'fas fa-user',           tab:'people',     color:'#60a5fa' },
      { label:'ვიდეოები',    icon:'fas fa-film',           tab:'videos',     color:'#10b981' },
      { label:'ბიზნესი',     icon:'fas fa-store',          tab:'businesses', color:'#34d399' },
      { label:'ადგილები',    icon:'fas fa-map-marker-alt', tab:'places',     color:'#fbbf24' },
      { label:'ივენთები',    icon:'fas fa-calendar',       tab:'events',     color:'#f87171' },
      { label:'ჯგუფები',     icon:'fas fa-users',          tab:'groups',     color:'#c084fc' }
    ];

    function showDiscover() {
      var body = document.getElementById('srchBody');
      if (!body) return;
      var recent = getRecent();
      var html = '';

      /* Quick browse links */
      html += '<div class="sr-discover-section">' +
        '<div class="sr-section-title"><i class="fas fa-compass"></i> Browse</div>' +
        '<div class="sr-quick-links">' +
        QUICK_LINKS.map(function(l) {
          return '<button class="sr-quick-link" onclick="window._srSetTab(\'' + l.tab + '\')" style="--ql-color:' + l.color + '">' +
            '<span class="sr-ql-icon"><i class="' + l.icon + '"></i></span>' +
            '<span>' + l.label + '</span>' +
          '</button>';
        }).join('') +
        '</div>' +
      '</div>';

      /* Trending topics */
      html += '<div class="sr-discover-section">' +
        '<div class="sr-section-title"><i class="fas fa-fire-flame-curved"></i> ტრენდული</div>' +
        '<div class="sr-trending-chips">' +
        TRENDING_TOPICS.map(function(t) {
          var qj = JSON.stringify(t.q);
          return '<button class="sr-trend-chip" onclick="window._srRunRecent(' + qj + ')">' +
            t.icon + ' ' + esc(t.q) +
          '</button>';
        }).join('') +
        '</div>' +
      '</div>';

      /* Recent searches */
      if (recent.length) {
        html += '<div class="sr-discover-section">' +
          '<div class="sr-section-title" style="display:flex;align-items:center;gap:6px">' +
            '<i class="fas fa-history"></i> ბოლო ძიებები' +
            '<button class="sr-recent-clear-all" onclick="window._srClearAll()">Clear all</button>' +
          '</div>' +
          '<div class="sr-recent-list">' +
          recent.map(function(q) {
            var qe = esc(q), qj = JSON.stringify(q);
            return '<div class="sr-recent-item" onclick="window._srRunRecent(' + qj + ')">' +
              '<div class="sr-recent-icon"><i class="fas fa-clock"></i></div>' +
              '<span class="sr-recent-text">' + qe + '</span>' +
              '<button class="sr-recent-del" onclick="event.stopPropagation();window._srDelRecent(' + qj + ')" title="Remove"><i class="fas fa-times"></i></button>' +
            '</div>';
          }).join('') +
          '</div>' +
        '</div>';
      }

      body.innerHTML = html;
    }

    /* ── Loading skeletons ── */
    function showSkeletons() {
      var body = document.getElementById('srchBody');
      if (!body) return;
      var skels = '';
      for (var i = 0; i < 7; i++) {
        skels += '<div class="sr-skel-item">' +
          '<div class="sr-skel-av"></div>' +
          '<div class="sr-skel-body">' +
          '<div class="sr-skel-line" style="width:' + (50 + Math.floor(i * 7) % 30) + '%"></div>' +
          '<div class="sr-skel-line" style="width:' + (30 + Math.floor(i * 11) % 25) + '%;margin-top:6px"></div>' +
          '</div></div>';
      }
      body.innerHTML = skels;
    }

    /* ── Result item HTML ── */
    function itemHtml(type, item) {
      var href = '#', av = '', name = '', sub = '', badge = '', badgeClass = '', extra = '', verified = false;
      if (type === 'user') {
        href = 'profile.html?id=' + encodeURIComponent(item.id || item.uid || '');
        av   = item.avatar || item.photoURL || item.avatarUrl || '';
        name = item.fullName || item.displayName || item.name || 'GeoHub User';
        sub  = item.username ? '@' + item.username : '';
        extra = (item.bio || item.about || item.location || item.city || '').toString().trim().substring(0, 60);
        verified = item.verified === true;
        badge = 'Person'; badgeClass = 'sr-badge-user';
      } else if (type === 'business') {
        href = 'business.html?id=' + encodeURIComponent(item.id || '');
        av   = item.logo || item.coverImage || item.image || '';
        name = item.name || item.title || 'Business';
        verified = item.verified === true;
        var _bz = [];
        if (item.category) _bz.push(item.category);
        if (item.businessType === 'online') _bz.push('Online');
        else if (item.city) _bz.push(item.city);
        sub = _bz.join(' · ') || 'Business';
        badge = 'Business'; badgeClass = 'sr-badge-biz';
      } else if (type === 'place') {
        href = 'places.html?id=' + encodeURIComponent(item.id || '');
        av   = item.image || item.coverImage || '';
        name = item.name || 'Place';
        var _pl = [];
        if (item.category) _pl.push(item.category);
        if (item.city) _pl.push(item.city);
        else if (item.address) _pl.push(item.address);
        sub = _pl.join(' · ') || 'Place';
        badge = 'Place'; badgeClass = 'sr-badge-place';
      } else if (type === 'event') {
        href = 'events.html?id=' + encodeURIComponent(item.id || '');
        av   = item.coverImage || item.image || '';
        name = item.name || item.title || 'Event';
        var _ev = [];
        var _evd = item.date || item.startDate || item.eventDate || '';
        if (_evd) _ev.push(String(_evd).substring(0, 10));
        if (item.location || item.city) _ev.push(item.location || item.city);
        sub = _ev.join(' · ') || (item.category || 'Event');
        badge = 'Event'; badgeClass = 'sr-badge-event';
      } else if (type === 'group') {
        href = 'groups.html?id=' + encodeURIComponent(item.id || '');
        av   = item.avatar || item.image || '';
        name = item.name || 'Group';
        var _gr = [];
        if (item.memberCount) _gr.push(item.memberCount + ' members');
        var _priv = item.privacy || item.privacyLevel || '';
        _gr.push(_priv === 'private' ? 'Private' : 'Public');
        if (item.category) _gr.push(item.category);
        sub = _gr.join(' · ');
        badge = 'Group'; badgeClass = 'sr-badge-group';
      } else if (type === 'post') {
        href = 'feed.html';
        av   = item.authorAvatar || '';
        name = item.authorName || 'GeoHub Post';
        sub  = (item.text || '').trim().replace(/\s+/g, ' ').substring(0, 80) || '(no caption)';
        if (item.mediaUrl || (Array.isArray(item.mediaUrls) && item.mediaUrls.length)) extra = 'Has media';
        badge = 'Post'; badgeClass = 'sr-badge-post';
      } else if (type === 'service') {
        var _svcBizId = item.businessId || item.bizId || '';
        href = _svcBizId ? 'business.html?id=' + encodeURIComponent(_svcBizId) : 'services.html';
        av   = item.image || '';
        name = item.name || item.title || 'Service';
        sub  = item.category || item.description || 'Service';
        badge = 'Service'; badgeClass = 'sr-badge-service';
      } else if (type === 'video') {
        href = 'watch.html?v=' + encodeURIComponent(item.id || '');
        av   = item.thumbnail || (item.youtubeId ? 'https://i.ytimg.com/vi/' + item.youtubeId + '/mqdefault.jpg' : '');
        name = item.title || 'Video';
        var _vt = [];
        if (item.channelName) _vt.push(item.channelName);
        if (item.category)    _vt.push(item.category);
        if (item.city)        _vt.push(item.city);
        sub = _vt.join(' · ') || (item.isShort ? 'Short' : 'Video');
        extra = item.description ? item.description.trim().substring(0, 70) : '';
        badge = item.isShort ? 'Short' : 'Video'; badgeClass = 'sr-badge-video';
      } else if (type === 'creator') {
        href = 'profile.html?id=' + encodeURIComponent(item.uid || item.id || '');
        av   = item.avatar || item.photoURL || '';
        name = item.name || item.displayName || 'Creator';
        sub  = '@' + (item.username || item.id || '') + (item.category ? ' · ' + item.category : ' · Creator');
        badge = 'Creator'; badgeClass = 'sr-badge-creator';
      } else if (type === 'learning') {
        href = 'learning.html?id=' + encodeURIComponent(item.id || '');
        av   = item.image || item.thumbnail || '';
        name = item.title || item.name || 'Course';
        sub  = (item.instructor ? item.instructor + ' · ' : '') + (item.category || 'Learning');
        badge = 'Learning'; badgeClass = 'sr-badge-learning';
      } else if (type === 'story') {
        href = '#';
        av   = item.authorAvatar || item.mediaUrl || '';
        name = item.authorName || 'GeoHub User';
        sub  = (item.text || '').trim().replace(/\s+/g, ' ').substring(0, 80) || (item.locationName ? '📍 ' + item.locationName : '(სტორი)');
        extra = item.hashtags && item.hashtags.length ? item.hashtags.map(function(t){ return '#'+t; }).join(' ') : '';
        badge = 'Story'; badgeClass = 'sr-badge-story';
      }
      var initial = esc((name || '?').charAt(0).toUpperCase());
      var avHtml;
      if (type === 'video' && av) {
        avHtml = '<img src="' + esc(av) + '" alt="" loading="lazy" decoding="async" style="object-fit:cover;width:100%;height:100%" onerror="this.style.display=\'none\'">' +
                 '<span class="sr-vid-play"><i class="fas fa-play"></i></span>';
      } else {
        avHtml = av
          ? '<img src="' + esc(av) + '" alt="" loading="lazy" decoding="async" onerror="this.outerHTML=\'<span>' + initial + '</span>\'">'
          : '<span>' + initial + '</span>';
      }
      var verBadge = verified ? ' <i class="fas fa-circle-check sr-verified" title="Verified"></i>' : '';
      var extraHtml = extra ? '<div class="sr-item-extra">' + esc(extra) + '</div>' : '';
      return '<a class="sr-item' + (type === 'video' ? ' sr-item-video' : '') + '" href="' + esc(href) + '">' +
        '<div class="sr-item-av sr-av-' + type + (type === 'video' ? ' sr-av-vid' : '') + '">' + avHtml + '</div>' +
        '<div class="sr-item-body">' +
          '<div class="sr-item-name">' + esc(name) + verBadge + '</div>' +
          '<div class="sr-item-sub">' + esc(sub) + '</div>' +
          extraHtml +
        '</div>' +
        '<span class="sr-badge ' + badgeClass + '">' + badge + '</span>' +
        '</a>';
    }

    /* ── Section with optional see-more ── */
    function sectionHtml(title, icon, items, type, limitItems) {
      if (!items.length) return '';
      var limit = limitItems ? 5 : items.length;
      var displayed = items.slice(0, limit);
      var q = document.getElementById('srchInput').value.trim();
      var seeMore = limitItems && items.length > 5
        ? '<a class="sr-see-more" href="search.html?q=' + encodeURIComponent(q) + '&tab=' + encodeURIComponent(type) + '">See all ' + items.length + ' <i class="fas fa-arrow-right"></i></a>'
        : '';
      return '<div class="sr-section">' +
        '<div class="sr-section-head">' +
          '<span class="sr-section-title"><i class="' + icon + '" style="color:#10b981"></i> ' + title + ' <span class="sr-cnt-badge">' + items.length + '</span></span>' +
          seeMore +
        '</div>' +
        '<div class="sr-results-list">' + displayed.map(function(item) { return itemHtml(type, item); }).join('') + '</div>' +
        '</div>';
    }

    /* ── Render results ── */
    function renderResults(results, q) {
      _lastResults = results;
      updateCounts(results);
      var body = document.getElementById('srchBody');
      if (!body) return;
      var tab = _tab;
      var isAll = tab === 'all';
      var html = '';
      var sections = [
        { tabId:'people',     key:'users',        title:'ადამიანები', icon:'fas fa-user',            type:'user' },
        { tabId:'stories',    key:'stories',      title:'სტორები',    icon:'fas fa-film',            type:'story' },
        { tabId:'videos',     key:'videos',       title:'ვიდეოები',   icon:'fas fa-play',            type:'video' },
        { tabId:'businesses', key:'businesses',   title:'ბიზნესი',    icon:'fas fa-store',           type:'business' },
        { tabId:'places',     key:'places',       title:'ადგილები',   icon:'fas fa-map-marker-alt',  type:'place' },
        { tabId:'events',     key:'events',       title:'ივენთები',   icon:'fas fa-calendar',        type:'event' },
        { tabId:'groups',     key:'groups',       title:'ჯგუფები',    icon:'fas fa-users',           type:'group' },
        { tabId:'posts',      key:'posts',        title:'პოსტები',    icon:'fas fa-newspaper',       type:'post' },
        { tabId:'services',   key:'services',     title:'სერვისები',  icon:'fas fa-grip',            type:'service' },
        { tabId:'creators',   key:'creators',     title:'Creators',   icon:'fas fa-camera-retro',    type:'creator' },
        { tabId:'learning',   key:'learningItems',title:'Learning',   icon:'fas fa-graduation-cap',  type:'learning' }
      ];
      sections.forEach(function(sec) {
        if (isAll || tab === sec.tabId) {
          html += sectionHtml(sec.title, sec.icon, results[sec.key] || [], sec.type, isAll);
        }
      });
      if (tab === 'posts' && (results.posts || []).length > 0) {
        html += '<p style="text-align:center;font-size:.7rem;color:var(--text-muted);padding:4px 0 8px">Showing recent posts only · full post search requires indexing</p>';
      }
      if (!html) {
        html = '<div class="sr-no-results">' +
          '<i class="fas fa-search"></i>' +
          '<p>No results for <span>"' + esc(q) + '"</span></p>' +
          '<p style="margin-top:8px;font-size:.8rem">Try different keywords or check spelling</p>' +
          '</div>';
      }
      body.innerHTML = html;
    }

    /* ── Global onclick helpers ── */
    window._srClearAll = function() { clearAllRecent(); showDiscover(); };
    window._srDelRecent = function(q) { removeRecent(q); showDiscover(); };
    window._srRunRecent = function(q) {
      var inp = document.getElementById('srchInput');
      var gs = document.getElementById('ghGlobalSearch');
      if (inp) { inp.value = q; if (clearBtn) clearBtn.classList.add('visible'); inp.dispatchEvent(new Event('input')); }
      if (gs) gs.value = q;
    };
    window._srSetTab = function(tabId) {
      setTab(tabId);
      var inp = document.getElementById('srchInput');
      if (inp && !inp.value.trim()) loadDefaultTab(tabId);
    };

    /* ── Error state ── */
    function showError() {
      var body = document.getElementById('srchBody');
      if (!body) return;
      body.innerHTML = '<div class="sr-no-results">' +
        '<i class="fas fa-triangle-exclamation"></i>' +
        '<p>Search unavailable right now.</p>' +
        '<p style="margin-top:8px;font-size:.8rem">Check your connection and try again.</p>' +
        '</div>';
    }

    /* ── Default tab browse (no query) — real Firestore data ── */
    var _DEFAULT_TYPE_MAP = {
      people:'user', videos:'video', businesses:'business', places:'place', events:'event',
      groups:'group', posts:'post', services:'service', creators:'creator',
      learning:'learning', stories:'story'
    };

    function renderDefaultTabResults(tabId, items) {
      var body = document.getElementById('srchBody');
      if (!body) return;
      if (!items.length) {
        body.innerHTML = '<div class="sr-no-results"><i class="fas fa-search"></i>' +
          '<p>Nothing here yet — be the first to add one!</p></div>';
        return;
      }
      var type = _DEFAULT_TYPE_MAP[tabId] || tabId;
      body.innerHTML = '<div class="sr-results-list">' +
        items.map(function(item) { return itemHtml(type, item); }).join('') +
        '</div>';
    }

    function loadDefaultTab(tabId) {
      if (tabId === 'hashtags') { _loadTrendingHashtags(); return; }
      if (tabId === 'stories') { _loadRecentStories(); return; }
      var collKey = TAB_KEY[tabId];
      if (!collKey) { showDiscover(); return; }

      if (_defaultTabCache[tabId]) {
        renderDefaultTabResults(tabId, _defaultTabCache[tabId]);
        return;
      }

      showSkeletons();

      function _doLoad() {
        var gfb = window.GeoFirebase;
        if (!gfb || !gfb.db || !gfb.fs) { showDiscover(); return; }
        var fs = gfb.fs;
        var db = gfb.db;
        fs.getDocs(fs.query(fs.collection(db, collKey), fs.limit(12)))
          .then(function(snap) {
            var items = [];
            snap.forEach(function(d) { items.push(Object.assign({ id: d.id }, d.data())); });
            _defaultTabCache[tabId] = items;
            var inp = document.getElementById('srchInput');
            if (inp && inp.value.trim()) return;
            if (_tab !== tabId) return;
            renderDefaultTabResults(tabId, items);
          })
          .catch(function() {
            var inp = document.getElementById('srchInput');
            if (inp && inp.value.trim()) return;
            if (_tab !== tabId) return;
            showError();
          });
      }

      if (window.GeoFirebase && window.GeoFirebase.db) {
        _doLoad();
      } else {
        window.addEventListener('GeoFirebaseReady', _doLoad, { once: true });
      }
    }

    /* ── Recent Stories (default browse) ── */
    function _loadRecentStories() {
      var body = document.getElementById('srchBody');
      if (!body) return;
      showSkeletons();
      function _doStories() {
        var gfb = window.GeoFirebase;
        if (!gfb || !gfb.db || !gfb.fs) { showDiscover(); return; }
        gfb.fs.getDocs(gfb.fs.query(
          gfb.fs.collection(gfb.db, 'stories'),
          gfb.fs.orderBy('createdAt', 'desc'),
          gfb.fs.limit(24)
        )).then(function(snap) {
          var items = [];
          snap.forEach(function(d) { items.push(Object.assign({ id: d.id }, d.data())); });
          if (_tab !== 'stories') return;
          if (!items.length) {
            body.innerHTML = '<div class="sr-no-results"><i class="fas fa-film"></i><p>სტორები არ არის</p></div>';
            return;
          }
          body.innerHTML = '<div class="sr-results-list">' +
            items.map(function(item) { return itemHtml('story', item); }).join('') +
          '</div>';
        }).catch(function() { if (_tab === 'stories') showError(); });
      }
      if (window.GeoFirebase && window.GeoFirebase.db) _doStories();
      else window.addEventListener('GeoFirebaseReady', _doStories, { once: true });
    }

    /* ── Trending Hashtags ── */
    function _loadTrendingHashtags() {
      var body = document.getElementById('srchBody');
      if (!body) return;
      showSkeletons();
      var q = (document.getElementById('srchInput') || {}).value || '';
      var needle = q.replace(/^#/, '').trim().toLowerCase();
      function _doHt() {
        var gfb = window.GeoFirebase;
        if (!gfb || !gfb.db || !gfb.fs) { showDiscover(); return; }
        var counts = {};
        Promise.all([
          gfb.fs.getDocs(gfb.fs.query(gfb.fs.collection(gfb.db, 'posts'), gfb.fs.limit(200))).catch(function(){ return { forEach: function(){} }; }),
          gfb.fs.getDocs(gfb.fs.query(gfb.fs.collection(gfb.db, 'stories'), gfb.fs.limit(200))).catch(function(){ return { forEach: function(){} }; })
        ]).then(function(snaps) {
          snaps.forEach(function(snap) {
            snap.forEach(function(d) {
              var data = d.data() || {};
              var tags = Array.isArray(data.hashtags) ? data.hashtags : [];
              tags.forEach(function(t) {
                if (!t) return;
                var low = t.toLowerCase();
                if (needle && low.indexOf(needle) === -1) return;
                counts[low] = (counts[low] || 0) + 1;
              });
            });
          });
          if (_tab !== 'hashtags') return;
          var sorted = Object.keys(counts).sort(function(a, b) { return counts[b] - counts[a]; }).slice(0, 40);
          if (!sorted.length) {
            body.innerHTML = '<div class="sr-no-results"><i class="fas fa-hashtag"></i><p>' +
              (needle ? '"#' + esc(needle) + '" ვერ მოიძებნა' : 'ჰეშთეგები არ არის') + '</p></div>';
            return;
          }
          body.innerHTML = '<div class="sr-ht-section"><div class="sr-section-title"><i class="fas fa-fire-flame-curved"></i> ტრენდული ჰეშთეგები</div>' +
            '<div class="sr-ht-grid">' +
            sorted.map(function(tag) {
              return '<a class="sr-ht-pill" href="feed.html?tag=' + encodeURIComponent(tag) + '">' +
                '<span class="sr-ht-hash">#</span>' + esc(tag) +
                '<span class="sr-ht-cnt">' + counts[tag] + '</span>' +
              '</a>';
            }).join('') +
            '</div></div>';
        }).catch(function() { if (_tab === 'hashtags') showError(); });
      }
      if (window.GeoFirebase && window.GeoFirebase.db) _doHt();
      else window.addEventListener('GeoFirebaseReady', _doHt, { once: true });
    }

    /* ── Search trigger ── */
    function doSearch(q) {
      if (_tab === 'hashtags') { _loadTrendingHashtags(); return; }
      if (!q) { showDiscover(); return; }
      showSkeletons();
      var GS = window.GeoSocial;
      if (!GS || !GS.searchFirestore) {
        window.addEventListener('GeoSocialReady', function() { doSearch(q); }, { once: true });
        return;
      }
      var _srTimeout = setTimeout(function() {
        if ((document.getElementById('srchInput') || {}).value && document.getElementById('srchInput').value.trim() === q) showError();
      }, 12000);
      GS.searchFirestore(q, function(results) {
        clearTimeout(_srTimeout);
        if (document.getElementById('srchInput').value.trim() !== q) return;
        saveRecent(q);
        var blocked = window._ghSrchBlockedIds || [];
        if (blocked.length && results.users) {
          results = Object.assign({}, results, { users: results.users.filter(function(u){ return blocked.indexOf(u.id) === -1; }) });
        }
        renderResults(results, q);
      });
    }

    /* ── Input events ── */
    var inp = document.getElementById('srchInput');
    var clearBtn = document.getElementById('srchClear');

    inp.addEventListener('input', function() {
      var q = this.value.trim();
      if (clearBtn) clearBtn.classList.toggle('visible', q.length > 0);
      clearTimeout(_debounce);
      if (!q) { showDiscover(); return; }
      showSkeletons();
      _debounce = setTimeout(function() { doSearch(q); }, 300);
    });

    clearBtn.addEventListener('click', function() {
      inp.value = '';
      clearBtn.classList.remove('visible');
      showDiscover();
      inp.focus();
    });

    inp.addEventListener('keydown', function(e) {
      if (e.key === 'Escape') { this.value = ''; clearBtn.classList.remove('visible'); showDiscover(); }
    });

    /* ── Init ── */
    function handleTabParam() {
      var tabParam = new URLSearchParams(location.search).get('tab');
      if (tabParam && TABS.some(function(t) { return t.id === tabParam; })) setTab(tabParam);
    }

    buildTabs();
    function setupSafetyPrefs() {
      var GS = window.GeoSocial;
      if (GS && GS.listenSafetyPrefs) {
        GS.listenSafetyPrefs(function(prefs) {
          window._ghSrchBlockedIds = prefs.blockedUserIds || [];
          if (_lastResults) {
            var q = document.getElementById('srchInput').value.trim();
            if (q) renderResults(_lastResults, q);
          }
        });
      }
    }
    if (window.GeoSocial) { setupSafetyPrefs(); }
    else { window.addEventListener('GeoSocialReady', setupSafetyPrefs, { once: true }); }
    window.addEventListener('pagehide', function() { clearTimeout(_debounce); });

    /* ── Firestore history sync (signed-in users only) ── */
    function syncFirestoreHistory() {
      _gfHistoryLoad(function(fsHistory) {
        if(!fsHistory || !fsHistory.length) return;
        // Merge: Firestore is source of truth; deduplicate with localStorage
        var local = getRecent();
        var merged = fsHistory.slice();
        local.forEach(function(q) { if(merged.indexOf(q) === -1) merged.push(q); });
        merged = merged.slice(0, MAX_RECENT);
        try { localStorage.setItem(RECENT_KEY, JSON.stringify(merged)); } catch(e) {}
        // Refresh discover view if user hasn't started typing
        var inp2 = document.getElementById('srchInput');
        if(!inp2 || !inp2.value.trim()) showDiscover();
      });
    }
    if(window.GeoFirebase && window.GeoFirebase.auth && window.GeoFirebase.auth.currentUser) {
      syncFirestoreHistory();
    } else {
      window.addEventListener('GeoFirebaseReady', syncFirestoreHistory, { once: true });
    }

    var initQ = new URLSearchParams(location.search).get('q') || '';
    if (initQ) {
      inp.value = initQ;
      if (clearBtn) clearBtn.classList.add('visible');
      handleTabParam();
      showSkeletons();
      if (window.GeoSocial) {
        doSearch(initQ);
      } else {
        window.addEventListener('GeoSocialReady', function() { doSearch(initQ); }, { once: true });
      }
    } else {
      handleTabParam();
      showDiscover();
      setTimeout(function() { inp.focus(); }, 100);
    }

  })();
  </script>
</body>
</html>
