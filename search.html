<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="dns-prefetch" href="https://firestore.googleapis.com">
  <link rel="dns-prefetch" href="https://firebase.googleapis.com">
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search — GeoHub</title>
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css"></noscript>
  <style>
  *{box-sizing:border-box}
  body{background:#05070f;color:#f8fafc;min-height:100vh;overflow-x:hidden;margin:0;font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}

  /* ── TOP BAR ── */
  .srch-topbar{position:fixed;top:0;left:0;right:0;height:60px;background:rgba(5,7,15,.97);border-bottom:1px solid rgba(255,255,255,.07);display:flex;align-items:center;gap:12px;padding:0 20px;z-index:200;backdrop-filter:blur(20px)}
  .srch-brand{display:flex;align-items:center;gap:8px;text-decoration:none;color:#f8fafc;font-weight:900;white-space:nowrap;font-size:1rem}
  .srch-brand-logo{width:32px;height:32px;background:linear-gradient(135deg,#10b981,#3b82f6);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.68rem;font-weight:900;color:#fff;flex-shrink:0}
  .srch-input-wrap{flex:1;display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);border-radius:26px;padding:9px 16px;transition:border-color .2s}
  .srch-input-wrap:focus-within{border-color:rgba(16,185,129,.5)}
  .srch-input-wrap i{color:#64748b}
  .srch-input-wrap input{flex:1;background:none;border:none;outline:none;color:#f8fafc;font-size:.95rem;font-family:inherit}
  .srch-input-wrap input::placeholder{color:#4b5563}
  .srch-clear{background:none;border:none;color:#4b5563;cursor:pointer;font-size:.85rem;padding:2px 4px;display:none}
  .srch-clear.visible{display:block}

  /* ── TABS ── */
  .srch-tabs{margin-top:60px;background:rgba(255,255,255,.025);border-bottom:1px solid rgba(255,255,255,.07);display:flex;gap:4px;overflow-x:auto;scrollbar-width:none;padding:0 20px;position:sticky;top:60px;z-index:100;backdrop-filter:blur(10px)}
  .srch-tabs::-webkit-scrollbar{display:none}
  .srch-tab{display:flex;align-items:center;gap:6px;padding:14px 16px;background:none;border:none;border-bottom:2px solid transparent;color:#64748b;font-weight:700;font-size:.82rem;cursor:pointer;white-space:nowrap;font-family:inherit;transition:all .2s}
  .srch-tab:hover{color:#e2e8f0}
  .srch-tab.active{color:#10b981;border-bottom-color:#10b981}
  .srch-tab-count{background:rgba(16,185,129,.15);color:#10b981;border-radius:99px;padding:1px 7px;font-size:.7rem;font-weight:800}

  /* ── MAIN ── */
  .srch-main{max-width:900px;margin:0 auto;padding:24px 20px 100px}

  /* ── INITIAL STATE ── */
  .srch-welcome{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:50vh;text-align:center;color:#64748b}
  .srch-welcome i{font-size:3rem;color:#10b981;opacity:.5;margin-bottom:20px}
  .srch-welcome h2{font-size:1.4rem;font-weight:900;color:#f0f4ff;margin:0 0 8px}
  .srch-welcome p{font-size:.9rem;max-width:320px;line-height:1.65}

  /* ── LOADING ── */
  .srch-loading{display:flex;align-items:center;justify-content:center;padding:60px;color:#64748b;gap:10px}

  /* ── RESULTS ── */
  .srch-section{margin-bottom:28px}
  .srch-section-title{font-size:.7rem;font-weight:800;text-transform:uppercase;letter-spacing:.8px;color:#4b5563;margin-bottom:12px;display:flex;align-items:center;gap:8px}
  .srch-results{display:flex;flex-direction:column;gap:8px}

  /* ── RESULT ITEMS ── */
  .srch-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border-radius:14px;background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);cursor:pointer;transition:all .15s;text-decoration:none;color:inherit}
  .srch-item:hover{background:rgba(255,255,255,.07);border-color:rgba(16,185,129,.25);transform:translateX(2px)}
  .srch-item-icon{width:46px;height:46px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1rem;font-weight:800;flex-shrink:0;overflow:hidden}
  .srch-item-icon img{width:100%;height:100%;object-fit:cover}
  .srch-item-body{flex:1;min-width:0}
  .srch-item-name{font-size:.9rem;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-bottom:2px}
  .srch-item-sub{font-size:.76rem;color:#64748b;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .srch-item-type{font-size:.65rem;font-weight:800;padding:3px 9px;border-radius:99px;flex-shrink:0}

  /* Type colors */
  .type-user{background:rgba(59,130,246,.15);color:#60a5fa}
  .type-group{background:rgba(16,185,129,.15);color:#34d399}
  .type-place{background:rgba(245,158,11,.15);color:#fbbf24}
  .type-post{background:rgba(168,85,247,.15);color:#c084fc}

  /* ── EMPTY ── */
  .srch-empty{text-align:center;padding:40px;color:#64748b}
  .srch-empty i{font-size:2rem;display:block;margin-bottom:12px;opacity:.5}

  /* ── MOBILE ── */
  @media(max-width:600px){
    .srch-topbar{padding:0 12px}
    .srch-brand span{display:none}
    .srch-main{padding:16px 12px 100px}
    .srch-tabs{padding:0 12px}
  }
  </style>
  <link rel="stylesheet" href="chat-popup.css">
  <link rel="stylesheet" href="responsive-polish.css">
</head>
<body>

<!-- TOP BAR -->
<header class="srch-topbar">
  <a href="index.html" class="srch-brand">
    <div class="srch-brand-logo">GH</div>
    <span>GeoHub</span>
  </a>
  <div class="srch-input-wrap">
    <i class="fas fa-search"></i>
    <input type="search" id="srchInput" placeholder="Search people, groups, places, posts…" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="srch-clear" id="srchClear" onclick="clearSearch()" title="Clear">✕</button>
  </div>
</header>

<!-- TABS -->
<div class="srch-tabs" id="srchTabs">
  <button class="srch-tab active" data-tab="all" onclick="setTab('all',this)">
    <i class="fas fa-th"></i> All
  </button>
  <button class="srch-tab" data-tab="people" onclick="setTab('people',this)">
    <i class="fas fa-user"></i> People <span class="srch-tab-count" id="cnt-people" style="display:none"></span>
  </button>
  <button class="srch-tab" data-tab="groups" onclick="setTab('groups',this)">
    <i class="fas fa-users"></i> Groups <span class="srch-tab-count" id="cnt-groups" style="display:none"></span>
  </button>
  <button class="srch-tab" data-tab="places" onclick="setTab('places',this)">
    <i class="fas fa-map-marker-alt"></i> Places <span class="srch-tab-count" id="cnt-places" style="display:none"></span>
  </button>
  <button class="srch-tab" data-tab="posts" onclick="setTab('posts',this)">
    <i class="fas fa-newspaper"></i> Posts <span class="srch-tab-count" id="cnt-posts" style="display:none"></span>
  </button>
</div>

<!-- MAIN -->
<main class="srch-main" id="srchMain">
  <div class="srch-welcome" id="srchWelcome">
    <i class="fas fa-search"></i>
    <h2>Search GeoHub</h2>
    <p>Find people, groups, places, and posts from across Georgia.</p>
  </div>
</main>

<script defer src="firestore-social.js"></script>
<script defer src="chat-popup.js"></script>
<script type="module" src="firebase-config.js"></script>
<script defer src="account.js"></script>
<script defer src="nav-cleanup.js"></script>
<script defer src="mobile-nav.js"></script>

<script>
  var _currentTab = 'all';
  var _lastResults = { users:[], groups:[], places:[], posts:[], businesses:[], events:[], services:[], rewards:[] };
  var _searchDebounce = null;

  function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
  window.logClick = function(type){ try { console.info('[GeoHub search click]', type); } catch(e) {} };
  function timeAgo(ts){
    if(!ts) return '';
    var ms=ts.toMillis?ts.toMillis():(ts.seconds?ts.seconds*1000:Number(ts));
    var d=Math.floor((Date.now()-ms)/1000);
    if(d<60) return d+'s ago';
    if(d<3600) return Math.floor(d/60)+'m ago';
    if(d<86400) return Math.floor(d/3600)+'h ago';
    return Math.floor(d/86400)+'d ago';
  }

  function setTab(tab, el){
    _currentTab = tab;
    document.querySelectorAll('.srch-tab').forEach(function(t){ t.classList.remove('active'); });
    if(el) el.classList.add('active');
    var q = document.getElementById('srchInput').value.trim();
    if(q) renderResults(_lastResults);
  }

  function clearSearch(){
    document.getElementById('srchInput').value = '';
    document.getElementById('srchClear').classList.remove('visible');
    showWelcome();
  }

  function showWelcome(){
    document.getElementById('srchMain').innerHTML = '<div class="srch-welcome" id="srchWelcome"><i class="fas fa-search"></i><h2>Search GeoHub</h2><p>Find people, groups, places, and posts from across Georgia.</p></div>';
    updateCounts({ users:[], groups:[], places:[], posts:[], businesses:[], events:[], services:[], rewards:[] });
  }

  function updateCounts(results){
    ['people','groups','places','posts'].forEach(function(tab){
      var k = tab==='people'?'users':tab;
      var cnt = document.getElementById('cnt-'+tab);
      var n = (results[k]||[]).length;
      if(cnt){ cnt.textContent=n; cnt.style.display=n?'inline':'none'; }
    });
  }

  function renderResults(results){
    _lastResults = results;
    updateCounts(results);
    var main = document.getElementById('srchMain');
    var tab = _currentTab;

    function userItem(u){
      var av = u.photoURL||u.avatarUrl||u.avatar||'';
      var iconHtml = av ? '<img loading="lazy" decoding="async" src="'+esc(av)+'" alt="" onerror="this.outerHTML=\'<div>'+esc((u.name||u.displayName||'U').charAt(0).toUpperCase())+'</div>\'">' : esc((u.name||u.displayName||'U').charAt(0).toUpperCase());
      return '<a class="srch-item" href="profile.html?id='+esc(u.id||u.uid)+'" onclick="logClick(\'user\')">'+
        '<div class="srch-item-icon" style="background:linear-gradient(135deg,#3b82f6,#6366f1)">'+iconHtml+'</div>'+
        '<div class="srch-item-body"><div class="srch-item-name">'+esc(u.name||u.displayName||u.email||'User')+'</div><div class="srch-item-sub">'+esc(u.username?'@'+u.username:'People on GeoHub')+'</div></div>'+
        '<span class="srch-item-type type-user">Person</span></a>';
    }

    function groupItem(g){
      return '<div class="srch-item" onclick="location.href=\'groups.html?id='+esc(g.id||g.uid||'')+'\'">'+
        '<div class="srch-item-icon" style="background:linear-gradient(135deg,#10b981,#34d399)"><i class="fas fa-users"></i></div>'+
        '<div class="srch-item-body"><div class="srch-item-name">'+esc(g.name)+'</div><div class="srch-item-sub">'+(g.memberCount||0)+' members · '+esc(g.category||'Group')+'</div></div>'+
        '<span class="srch-item-type type-group">Group</span></div>';
    }

    function placeItem(p){
      return '<div class="srch-item" onclick="location.href=\'places.html\'">'+
        '<div class="srch-item-icon" style="background:linear-gradient(135deg,#f59e0b,#d97706)"><i class="fas fa-map-marker-alt"></i></div>'+
        '<div class="srch-item-body"><div class="srch-item-name">'+esc(p.name)+'</div><div class="srch-item-sub">'+esc(p.address||p.category||'Place')+'</div></div>'+
        '<span class="srch-item-type type-place">Place</span></div>';
    }


    function businessItem(b){
      return '<a class="srch-item" href="business.html?id='+esc(b.id||'')+'" onclick="logClick(\'business\')"><div class="srch-item-icon" style="background:linear-gradient(135deg,#10b981,#2f80ed)"><i class="fas fa-store"></i></div><div class="srch-item-body"><div class="srch-item-name">'+esc(b.name||b.title||'Business')+'</div><div class="srch-item-sub">'+esc(b.businessType==='online'?'Online / Nationwide':(b.city||b.category||'Business'))+'</div></div><span class="srch-item-type type-group">Business</span></a>';
    }
    function rewardItem(r){
      return '<a class="srch-item" href="rewards.html" onclick="logClick(\'reward\')"><div class="srch-item-icon" style="background:linear-gradient(135deg,#f59e0b,#10b981)"><i class="fas fa-gift"></i></div><div class="srch-item-body"><div class="srch-item-name">'+esc(r.title||r.name||'Reward')+'</div><div class="srch-item-sub">'+esc((r.pointPrice||0)+' GeoPoints · '+(r.rewardType||'reward'))+'</div></div><span class="srch-item-type type-place">Reward</span></a>';
    }

    function postItem(p){
      var av = p.authorAvatar||'';
      var iconHtml = av ? '<img loading="lazy" decoding="async" src="'+esc(av)+'" alt="" onerror="this.outerHTML=\'<div style=\'font-size:.8rem\'>'+(p.authorName||'U').charAt(0).toUpperCase()+'</div>\'">' : esc((p.authorName||'U').charAt(0).toUpperCase());
      return '<div class="srch-item" onclick="location.href=\'feed.html#post-'+esc(p.id||'')+'\'">'+
        '<div class="srch-item-icon" style="background:linear-gradient(135deg,#7c3aed,#a855f7)">'+iconHtml+'</div>'+
        '<div class="srch-item-body"><div class="srch-item-name">'+esc(p.authorName||'Post')+'</div><div class="srch-item-sub">'+esc((p.text||'').substring(0,60))+'</div></div>'+
        '<span class="srch-item-type type-post">Post</span></div>';
    }

    function section(title, icon, items, renderFn, emptyMsg){
      if(!items.length) return '';
      return '<div class="srch-section"><div class="srch-section-title"><i class="'+icon+'" style="color:#10b981"></i> '+title+' ('+items.length+')</div><div class="srch-results">'+items.slice(0,10).map(renderFn).join('')+'</div></div>';
    }

    var html = '';

    if(tab==='all'||tab==='people'){
      var usrs = results.users||[];
      if(usrs.length) html += section('People','fas fa-user',usrs,userItem);
    }
    if(tab==='all'||tab==='groups'){
      var grps = results.groups||[];
      if(grps.length) html += section('Groups','fas fa-users',grps,groupItem);
    }
    if(tab==='all'||tab==='places'){
      var plcs = results.places||[];
      if(plcs.length) html += section('Places','fas fa-map-marker-alt',plcs,placeItem);
    }
    if(tab==='all'){
      var biz = results.businesses||[]; if(biz.length) html += section('Businesses','fas fa-store',biz,businessItem);
      var rw = results.rewards||[]; if(rw.length) html += section('Rewards','fas fa-gift',rw,rewardItem);
    }
    if(tab==='all'||tab==='posts'){
      var psts = results.posts||[];
      if(psts.length) html += section('Posts','fas fa-newspaper',psts,postItem);
    }

    if(!html){
      var q = document.getElementById('srchInput').value.trim();
      html = '<div class="srch-empty"><i class="fas fa-search"></i>No results for "'+esc(q)+'"<p style="margin:8px 0 0;font-size:.84rem">Try different keywords</p></div>';
    }

    main.innerHTML = html;
  }

  document.getElementById('srchInput').addEventListener('input', function(){
    var q = this.value.trim();
    document.getElementById('srchClear').classList.toggle('visible', q.length>0);

    if(!q){ showWelcome(); return; }

    document.getElementById('srchMain').innerHTML = '<div class="srch-loading"><i class="fas fa-spinner fa-spin"></i> Searching…</div>';

    clearTimeout(_searchDebounce);
    _searchDebounce = setTimeout(function(){
      var GS = window.GeoSocial;
      if(!GS){ return; }
      GS.searchFirestore(q, function(results){
        var curQ = document.getElementById('srchInput').value.trim();
        if(curQ !== q) return;
        renderResults(results);
      });
    }, 350);
  });

  // pre-fill from URL ?q=
  window.addEventListener('GeoSocialReady', function(){
    var params = new URLSearchParams(location.search);
    var q = params.get('q');
    if(q){
      var inp = document.getElementById('srchInput');
      inp.value = q;
      inp.dispatchEvent(new Event('input'));
    } else {
      inp && inp.focus();
    }
  });

  if(!window.GeoSocial) {
    window.addEventListener('GeoSocialReady', function(){
      var inp = document.getElementById('srchInput');
      if(inp && !inp.value) inp.focus();
    }, {once:true});
  } else {
    document.getElementById('srchInput').focus();
  }
</script>
<script defer src="geohub-production-stabilization-v1.js"></script>
  <script defer src="responsive-polish.js"></script>
</body>
</html>
