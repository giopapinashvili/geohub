<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="dns-prefetch" href="https://firestore.googleapis.com">
  <link rel="dns-prefetch" href="https://firebase.googleapis.com">
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, interactive-widget=resizes-content">
  <title>Messages — GeoHub</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css"></noscript>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="account-switcher.css">
  <link rel="stylesheet" href="messages.css">
  <link rel="stylesheet" href="geohub-social-redesign.css">
  <link rel="stylesheet" href="chat-popup.css">
  <link rel="stylesheet" href="responsive-polish.css">
  <style>
    /* Bridge: map legacy CSS variables → GH design tokens */
    body.page-messages { padding-top: 0 !important; height: 100dvh !important; overflow: hidden !important; }
    :root {
      --navbar-height: 72px;
      --bg-0: var(--gh-bg);
      --bg-1: var(--gh-bg);
      --bg-card: var(--gh-card);
      --bg-elevated: var(--gh-card-soft);
      --text-primary: var(--gh-text);
      --text-secondary: var(--gh-muted);
      --text-muted: var(--gh-muted);
      --border: var(--gh-border);
      --border-subtle: var(--gh-border);
      --border-emphasis: var(--gh-border-strong);
      --radius-full: var(--gh-radius-full);
      --transition: var(--gh-dur-fast) var(--gh-ease);
    }
  </style>
  <script>(function(){try{var t=localStorage.getItem('gh_theme')||'dark';document.documentElement.setAttribute('data-gh-theme',t);}catch(e){document.documentElement.setAttribute('data-gh-theme','dark');}})();</script>
</head>
<body class="page-messages" data-gh-page="messages">
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon">🌍</div>
      <span class="logo-text">Geo<span class="logo-geo">Hub</span></span>
    </a>
    <ul class="navbar-links"></ul>
    <div class="navbar-actions">
      <a href="profile.html" class="btn btn-ghost btn-sm"><i class="fas fa-user"></i> Profile</a>
    </div>
    <button class="hamburger" id="geoHamburger" onclick="geoToggleMenu()" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="mobile-menu"></div>

  <div class="messages-page">
    <div class="messages-layout">

      <!-- ===== LEFT SIDEBAR ===== -->
      <div class="msg-sidebar">
        <div class="sidebar-top">
          <div class="sidebar-title">
            <span data-i18n="msg_title">Messages</span>
            <div class="sidebar-title-actions">
              <button class="sidebar-icon-btn" data-i18n-title="msg_new" title="New message" onclick="openNewConversationSearch()"><i class="fas fa-edit"></i></button>
              <button class="sidebar-icon-btn" title="Filter"><i class="fas fa-sliders-h"></i></button>
            </div>
          </div>
          <div class="conv-search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" class="conv-search" data-i18n-placeholder="msg_search_convs" placeholder="Search conversations…" oninput="searchConvs(this.value)">
          </div>
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="setFilter('all',this)" data-i18n="msg_all">All</button>
            <button class="filter-tab" onclick="setFilter('unread',this)" data-i18n="msg_unread">Unread</button>
          </div>
        </div>
        <div class="conv-list" id="convList"></div>
      </div>

      <!-- ===== CHAT WINDOW ===== -->
      <div class="chat-window">
        <div class="chat-header" id="chatHeader">
          <div style="color:var(--text-muted);font-size:0.85rem;padding:0 16px" data-i18n="msg_select_conv">Select a conversation</div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>

        <!-- Typing indicator -->
        <div class="typing-row" style="padding:0 16px 4px">
          <div class="msg-av-col"></div>
          <div id="typingIndicator">
            <div class="typing-bubble">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>

        <!-- Message search bar -->
        <div class="msg-search-wrap" id="msgSearchWrap" style="display:none">
          <i class="fas fa-search"></i>
          <input type="text" id="msgSearchInput" class="msg-search-input" data-i18n-placeholder="msg_search_msgs" placeholder="Search messages…">
          <button class="msg-search-close" type="button" onclick="window.__ghToggleSearch()"><i class="fas fa-times"></i></button>
        </div>

        <!-- Reply preview bar -->
        <div class="reply-preview-bar" id="replyPreviewBar" style="display:none"></div>

        <!-- Quick replies -->
        <div class="quick-replies-bar" id="quickRepliesBar" style="display:none"></div>

        <!-- Input bar -->
        <div class="chat-input-bar">
          <button class="input-btn attach-menu-btn" id="attachmentMenuBtn" title="Attachments" aria-label="Attachments" aria-expanded="false" onclick="window.__ghToggleAttachSheet&&window.__ghToggleAttachSheet(event)"><i class="fas fa-plus"></i></button>
          <input type="text" id="msgInput" class="msg-input" data-i18n-placeholder="msg_type_msg" placeholder="Type a message…">
          <button class="input-btn" id="emojiBtn" title="Emoji" onclick="toggleEmojiPicker()"><i class="fas fa-smile"></i></button>
          <button class="send-btn" onclick="sendMsg()" title="Send"><i class="fas fa-paper-plane"></i></button>
          <div class="msg-attach-sheet" id="msgAttachSheet" aria-hidden="true">
            <button type="button" data-pick-image><i class="fas fa-image"></i><span data-i18n="msg_photo">Photo</span></button>
            <button type="button" id="fileAttachBtn"><i class="fas fa-file-alt"></i><span data-i18n="msg_file">File</span></button>
            <button type="button" id="voiceBtn"><i class="fas fa-microphone"></i><span data-i18n="msg_voice">Voice</span></button>
          </div>
          <div class="emoji-picker-wrap" id="emojiPicker"></div>
          <input id="messageImageInput" type="file" accept="image/*" hidden>
          <input id="messageFileInput" type="file" accept=".pdf,.doc,.docx,.txt,.xls,.xlsx,.csv" hidden>
        </div>
      </div>

      <!-- ===== INFO PANEL ===== -->
      <div class="info-panel" id="infoPanel">
        <div class="info-scroll">
          <div style="color:var(--text-muted);text-align:center;padding:40px 16px;font-size:0.85rem" data-i18n="msg_conv_details">Select a conversation to see details</div>
        </div>
      </div>

    </div>
  </div>


  <div id="newConversationModal" class="msg-modal" hidden>
    <div class="msg-modal-card">
      <button class="msg-modal-close" type="button" onclick="closeNewConversationSearch()">×</button>
      <h3 data-i18n="msg_start_conv">Start a conversation</h3>
      <p data-i18n="msg_start_sub">Search real users and open a chat.</p>
      <input id="newConversationSearch" class="msg-input" data-i18n-placeholder="msg_search_user" placeholder="Search by name or email…" oninput="searchNewConversationUsers(this.value)">
      <div id="newConversationResults" class="new-conversation-results"></div>
    </div>
  </div>

  <div id="msgToast" class="msg-toast"></div>

  <!-- Phase 65M: removed visualViewport bottom script; mobile spacing is handled with CSS padding to avoid viewport-size jumps. -->
  <script defer src="geohub-social-redesign.js"></script>
  <script defer src="messages-page.js"></script>

  <script defer src="mode.js"></script>
  <script type="module" src="firebase-config.js"></script>
  <script defer src="gh-i18n.js"></script>
  <script defer src="gh-schema.js"></script>
  <script defer src="firestore-social.js"></script>
  <script defer src="config.js"></script>
  <script defer src="api-client.js"></script>
  <script defer src="main.js"></script>
  <script defer src="account.js"></script>
  <script defer src="messages.js"></script>
  <script defer src="geo-actors.js"></script>
  <script defer src="account-switcher.js"></script>
  <script defer src="real-messages.js"></script>
  <script defer src="nav-cleanup.js"></script>
  <script defer src="mobile-nav.js"></script>
  <script defer src="geohub-production-v6.js"></script>
  <script defer src="geohub-production-stabilization-v1.js"></script>
  <script defer src="responsive-polish.js"></script>
  <script defer src="push-notifications.js"></script>
</body>
</html>
