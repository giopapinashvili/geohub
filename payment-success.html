<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="icons/icon-96.png">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="dns-prefetch" href="https://firestore.googleapis.com">
  <link rel="dns-prefetch" href="https://firebase.googleapis.com">
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Successful — GeoHub</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="description" content="გადახდა წარმატებით დასრულდა. გმადლობ!">
  <link rel="canonical" href="https://geohub.ge/payment-success.html">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="GeoHub">
  <meta property="og:title" content="გადახდა წარმატებულია — GeoHub">
  <meta property="og:description" content="გადახდა წარმატებით დასრულდა. გმადლობ!">
  <meta property="og:url" content="https://geohub.ge/payment-success.html">
  <meta property="og:image" content="https://geohub.ge/icons/icon-512.png">
  <meta name="robots" content="noindex, nofollow">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 20% 20%, rgba(16,185,129,.18), transparent 40%),
                  radial-gradient(ellipse at 80% 80%, rgba(59,130,246,.14), transparent 40%), #04050d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e2e8f0;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px; padding: 40px 32px; max-width: 480px; width: 100%; text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
    }
    .icon-wrap {
      width: 72px; height: 72px; border-radius: 50%;
      background: linear-gradient(135deg,#10b981,#059669);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 1.8rem;
      box-shadow: 0 0 40px rgba(16,185,129,.4);
    }
    .icon-wrap.loading { background: rgba(255,255,255,.08); animation: pulse 1.4s ease-in-out infinite; }
    .icon-wrap.error   { background: linear-gradient(135deg,#ef4444,#dc2626); }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.5} }
    h1 { font-size: 1.6rem; font-weight: 700; margin-bottom: 8px; }
    p  { color: #94a3b8; line-height: 1.6; font-size: .9rem; margin-bottom: 20px; }

    .ticket-box {
      background: rgba(16,185,129,.08); border: 1px solid rgba(16,185,129,.2);
      border-radius: 14px; padding: 18px; margin: 20px 0; text-align: left;
    }
    .ticket-box .label { color: #94a3b8; font-size: .75rem; text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
    .ticket-code {
      font-size: 1.3rem; font-weight: 800; letter-spacing: .12em; color: #10b981;
      font-family: 'Courier New', monospace; margin-bottom: 12px;
    }
    .qr-img { display: block; margin: 0 auto 12px; border-radius: 10px; background: #fff; padding: 4px; }

    .copy-btn {
      background: none; border: 1px solid rgba(16,185,129,.4); color: #10b981;
      border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: .8rem; font-weight: 600;
      transition: background .2s;
    }
    .copy-btn:hover { background: rgba(16,185,129,.12); }

    .premium-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg,rgba(245,158,11,.15),rgba(234,88,12,.1));
      border: 1px solid rgba(245,158,11,.3); border-radius: 99px;
      padding: 8px 18px; margin: 16px 0; font-weight: 700; color: #f59e0b; font-size: .9rem;
    }

    .btn {
      display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
      padding: 12px 24px; border-radius: 12px; font-weight: 700; font-size: .9rem;
      cursor: pointer; border: none; transition: opacity .2s;
    }
    .btn-primary { background: linear-gradient(135deg,#10b981,#059669); color: #fff; }
    .btn-ghost   { background: rgba(255,255,255,.06); color: #e2e8f0; }
    .btn:hover   { opacity: .88; }
    .actions     { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; margin-top: 8px; }

    .status-msg { font-size: .8rem; color: #64748b; margin-top: 16px; }
  </style>
</head>
<body>

<div class="card" id="card">
  <div class="icon-wrap loading" id="iconWrap">
    <i class="fas fa-spinner fa-spin"></i>
  </div>
  <h1 id="title">Confirming payment…</h1>
  <p  id="subtitle">Please wait while we verify your payment. This usually takes a few seconds.</p>
  <div id="details"></div>
  <div id="actions"></div>
  <p class="status-msg" id="statusMsg"></p>
</div>

<script type="module" src="firebase-config.js"></script>
<script defer src="stripe-checkout.js"></script>
<script>
(function () {
  var params    = new URLSearchParams(location.search);
  var sessionId = params.get('session_id');
  var type      = params.get('type') || 'ticket';

  var iconWrap  = document.getElementById('iconWrap');
  var title     = document.getElementById('title');
  var subtitle  = document.getElementById('subtitle');
  var details   = document.getElementById('details');
  var actions   = document.getElementById('actions');
  var statusMsg = document.getElementById('statusMsg');

  function esc(s) {
    return String(s || '').replace(/[&<>"']/g, function (c) {
      return { '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c];
    });
  }

  function qrUrl(code) {
    return 'https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=' + encodeURIComponent(code) + '&format=svg&margin=2';
  }

  function showSuccess(result) {
    iconWrap.className = 'icon-wrap';
    iconWrap.innerHTML = '<i class="fas fa-check"></i>';

    if (type === 'ticket' && result.ticket) {
      var t = result.ticket;
      title.textContent    = 'Ticket confirmed!';
      subtitle.textContent = 'Your ticket is ready. Show the QR code or ticket code at the entrance.';
      details.innerHTML = [
        '<div class="ticket-box">',
          '<div class="label">Ticket code</div>',
          '<div class="ticket-code">' + esc(t.ticketCode) + '</div>',
          '<img class="qr-img" src="' + qrUrl(t.qrValue || t.ticketCode) + '" width="160" height="160" alt="QR Code">',
          '<button class="copy-btn" id="copyBtn"><i class="fas fa-copy"></i> Copy code</button>',
        '</div>',
      ].join('');

      document.getElementById('copyBtn').onclick = function () {
        navigator.clipboard && navigator.clipboard.writeText(t.ticketCode).then(function () {
          document.getElementById('copyBtn').innerHTML = '<i class="fas fa-check"></i> Copied!';
        });
      };

      actions.innerHTML = [
        '<div class="actions">',
          '<a href="events.html" class="btn btn-primary"><i class="fas fa-calendar"></i> Back to Events</a>',
          '<a href="feed.html"   class="btn btn-ghost"><i class="fas fa-house"></i> Home</a>',
        '</div>',
      ].join('');

    } else if (type === 'subscription') {
      title.textContent    = 'Premium activated!';
      subtitle.textContent = 'Your business is now verified and featured across GeoHub.';
      details.innerHTML = '<div class="premium-badge"><i class="fas fa-crown"></i> Premium Business</div>';
      actions.innerHTML = [
        '<div class="actions">',
          '<a href="dashboard.html" class="btn btn-primary"><i class="fas fa-chart-bar"></i> Open Dashboard</a>',
          '<a href="feed.html"      class="btn btn-ghost"><i class="fas fa-house"></i> Home</a>',
        '</div>',
      ].join('');

    } else {
      title.textContent    = 'Payment successful!';
      subtitle.textContent = 'Thank you for your purchase.';
      actions.innerHTML = '<div class="actions"><a href="feed.html" class="btn btn-primary"><i class="fas fa-house"></i> Go Home</a></div>';
    }
  }

  function showError(msg) {
    iconWrap.className = 'icon-wrap error';
    iconWrap.innerHTML = '<i class="fas fa-exclamation"></i>';
    title.textContent    = 'Something went wrong';
    subtitle.textContent = msg || 'We could not confirm your payment. If you were charged, please contact support.';
    actions.innerHTML = [
      '<div class="actions">',
        '<a href="events.html" class="btn btn-ghost"><i class="fas fa-arrow-left"></i> Back</a>',
      '</div>',
    ].join('');
  }

  function poll() {
    if (!sessionId) { showError('No session ID found in URL.'); return; }

    var attempt = 0;
    statusMsg.textContent = 'Waiting for payment confirmation…';

    function check() {
      attempt++;
      if (attempt > 20) { showError('Confirmation is taking longer than expected. Please check your email or contact support.'); return; }

      statusMsg.textContent = 'Checking… (attempt ' + attempt + '/20)';

      fetch((window.GeoConfig && window.GeoConfig.PAYMENTS && window.GeoConfig.PAYMENTS.WORKER_URL || 'https://geohub-payments.YOUR-SUBDOMAIN.workers.dev') + '/payment-status/' + encodeURIComponent(sessionId))
        .then(function (r) { return r.json(); })
        .then(function (data) {
          if (data.status === 'completed') {
            statusMsg.textContent = '';
            showSuccess(data);
          } else if (data.status === 'pending') {
            setTimeout(check, 3000);
          } else {
            showError(data.status === 'not_found' ? 'Payment record not found.' : 'Payment was not completed.');
          }
        })
        .catch(function () { if (attempt < 20) setTimeout(check, 3000); else showError(); });
    }

    // Give Stripe webhook a 2s head start before first check
    setTimeout(check, 2000);
  }

  document.addEventListener('DOMContentLoaded', poll);
})();
</script>
</body>
</html>
