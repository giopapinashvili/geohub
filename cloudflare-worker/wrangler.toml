name             = "geohub-payments"
main             = "worker.js"
compatibility_date = "2024-11-01"
workers_dev      = true

[vars]
FIREBASE_PROJECT_ID = "geohub-main"
SITE_URL            = "https://geohub.pages.dev"

# ─────────────────────────────────────────────────────────────────────────────
# Set all secrets below via CLI — NEVER commit real values here:
#
#   wrangler secret put STRIPE_SECRET_KEY
#   wrangler secret put STRIPE_WEBHOOK_SECRET
#   wrangler secret put STRIPE_PRICE_PREMIUM_MONTHLY
#   wrangler secret put STRIPE_PRICE_PREMIUM_YEARLY
#   wrangler secret put FIREBASE_API_KEY
#   wrangler secret put FIREBASE_CLIENT_EMAIL
#   wrangler secret put FIREBASE_PRIVATE_KEY
#   wrangler secret put GOOGLE_MAPS_API_KEY   (Places API New — enable in Google Cloud Console)
#   wrangler secret put CLOUDFLARE_TURN_KEY_ID     (optional — Cloudflare Calls TURN; see below)
#   wrangler secret put CLOUDFLARE_TURN_KEY_TOKEN  (optional — Cloudflare Calls TURN; see below)
#
# CLOUDFLARE_TURN_KEY_ID + CLOUDFLARE_TURN_KEY_TOKEN:
#   Cloudflare Dashboard → Calls → Manage TURN keys → Create key
#   Copy the Key ID and Token from the key detail page.
#   Without these the worker falls back to the free openrelay.metered.ca TURN server.
#
# STRIPE_PRICE_PREMIUM_MONTHLY / YEARLY:
#   Create a Product + recurring Price in Stripe Dashboard → Products
#   Copy the Price ID (price_xxx) and set it as the secret.
#
# FIREBASE_CLIENT_EMAIL + FIREBASE_PRIVATE_KEY:
#   Firebase Console → Project Settings → Service Accounts → Generate new private key
#   Open the downloaded JSON and copy:
#     "client_email"  → FIREBASE_CLIENT_EMAIL
#     "private_key"   → FIREBASE_PRIVATE_KEY  (include -----BEGIN/END PRIVATE KEY-----)
#
# FIREBASE_API_KEY:
#   Firebase Console → Project Settings → General → Web API Key
# ─────────────────────────────────────────────────────────────────────────────

# Custom domain (after deploying):
# [[routes]]
# pattern = "payments.geohub.ge/*"
# zone_name = "geohub.ge"
