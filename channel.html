<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Channel — GeoHub</title>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="stylesheet" href="geohub-social-redesign.css">
  <link rel="stylesheet" href="videos.css">
  <meta name="theme-color" content="#10b981">
  <script>(function(){try{var t=localStorage.getItem('gh_theme')||'dark';document.documentElement.setAttribute('data-gh-theme',t);}catch(e){document.documentElement.setAttribute('data-gh-theme','dark');}})();</script>
</head>
<body data-gh-page="channel">
  <noscript>GeoHub requires JavaScript.</noscript>
  <script type="module" src="firebase-config.js"></script>
  <script defer src="account.js"></script>
  <script defer src="videos.js"></script>
  <script defer src="channel.js"></script>

  <div class="vid-page" id="channelPage">
    <div class="ch-init-loading"><i class="fas fa-spinner fa-spin"></i></div>
  </div>
</body>
</html>
