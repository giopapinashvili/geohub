<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <title>Stories & Reels — GeoHub</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#04050d">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{color-scheme:dark}
    html,body{height:100%;overflow:hidden;background:#04050d;font-family:'Inter',system-ui,sans-serif;color:#f1f5f9;-webkit-tap-highlight-color:transparent}

    /* ── PAGE ─────────────────────────────────────────────────── */
    .sr-page{height:100vh;height:100dvh;display:flex;flex-direction:column;overflow:hidden;position:relative}

    /* ── AMBIENT BACKGROUND ───────────────────────────────────── */
    #srAmbient{position:fixed;inset:0;z-index:0;pointer-events:none;filter:blur(90px);opacity:0;transition:background 0.6s,opacity 0.4s}

    /* ── TABS BAR ─────────────────────────────────────────────── */
    .sr-tabs-bar{position:relative;z-index:50;display:flex;align-items:center;gap:10px;padding:10px 12px 9px;background:rgba(4,5,13,0.96);border-bottom:1px solid rgba(255,255,255,0.06);flex-shrink:0;backdrop-filter:blur(16px)}
    .sr-logo-back{flex-shrink:0;width:34px;height:34px;border-radius:10px;background:rgba(16,185,129,0.15);border:1px solid rgba(16,185,129,0.3);color:#10b981;font-size:0.78rem;font-weight:900;display:flex;align-items:center;justify-content:center;text-decoration:none;cursor:pointer;transition:background 0.2s}
    .sr-logo-back:hover{background:rgba(16,185,129,0.25)}
    .sr-tabs-scroll{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;flex:1}
    .sr-tabs-scroll::-webkit-scrollbar{display:none}
    .sr-tab{flex-shrink:0;padding:7px 15px;border-radius:100px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.55);font-size:0.79rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all 0.2s;font-family:inherit}
    .sr-tab:hover{background:rgba(255,255,255,0.12);color:#fff}
    .sr-tab.active{background:rgba(16,185,129,0.15);border-color:rgba(16,185,129,0.4);color:#10b981}

    /* ── STAGE ────────────────────────────────────────────────── */
    .sr-stage{flex:1;display:flex;align-items:center;justify-content:center;position:relative;z-index:1;overflow:hidden}
    .sr-reel-wrap{position:relative;display:flex;flex-direction:column;align-items:center}

    /* ── REEL CARD ────────────────────────────────────────────── */
    .sr-reel{position:relative;width:100vw;max-width:400px;height:calc(100vh - 60px);height:calc(100dvh - 60px);overflow:hidden;background:#000;border-radius:0;will-change:opacity,transform}
    @media(min-width:768px){
      .sr-reel{height:min(84vh,740px);border-radius:20px;box-shadow:0 0 80px rgba(0,0,0,0.95),0 0 0 1px rgba(255,255,255,0.07),0 0 120px rgba(16,185,129,0.06)}
    }

    /* ── MEDIA BACKGROUND ─────────────────────────────────────── */
    .sr-media{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;transition:background 0.4s}
    .sr-emoji{font-size:5.5rem;animation:srFloat 4s ease-in-out infinite;filter:drop-shadow(0 0 40px rgba(255,255,255,0.15));line-height:1}
    @keyframes srFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-12px) scale(1.05)}}
    .sr-scene{font-size:0.88rem;font-weight:700;color:rgba(255,255,255,0.3);letter-spacing:0.06em;text-align:center;text-transform:uppercase}
    .sr-media-noise{position:absolute;inset:0;pointer-events:none;opacity:0.035;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E")}

    /* ── VIGNETTE ─────────────────────────────────────────────── */
    .sr-vignette{position:absolute;inset:0;pointer-events:none;background:linear-gradient(to top,rgba(0,0,0,0.88) 0%,rgba(0,0,0,0.3) 35%,transparent 58%),linear-gradient(to bottom,rgba(0,0,0,0.55) 0%,transparent 28%)}

    /* ── PROGRESS BAR ─────────────────────────────────────────── */
    .sr-pb-row{position:absolute;top:8px;left:12px;right:12px;z-index:30;height:2px;background:rgba(255,255,255,0.2);border-radius:1px;overflow:hidden}
    .sr-pb-fill{height:100%;background:#fff;border-radius:1px;width:0%}

    /* ── TOP HEADER ───────────────────────────────────────────── */
    .sr-top-hd{position:absolute;top:18px;left:0;right:0;z-index:30;display:flex;align-items:center;justify-content:space-between;padding:0 14px}
    .sr-close-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.14);color:#fff;font-size:0.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center;text-decoration:none;transition:background 0.2s}
    .sr-close-btn:hover{background:rgba(0,0,0,0.7)}
    .sr-type-chip{padding:5px 12px;border-radius:100px;font-size:0.7rem;font-weight:800;letter-spacing:0.05em;display:flex;align-items:center;gap:6px;backdrop-filter:blur(10px)}
    .sr-more-btn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.14);color:#fff;font-size:0.88rem;cursor:pointer;display:flex;align-items:center;justify-content:center}

    /* ── NAV ZONES ────────────────────────────────────────────── */
    .sr-nav-l,.sr-nav-r{position:absolute;top:60px;bottom:170px;z-index:20;width:40%;cursor:pointer}
    .sr-nav-l{left:0}
    .sr-nav-r{right:0}

    /* ── SIDE ACTIONS ─────────────────────────────────────────── */
    .sr-side{position:absolute;right:10px;bottom:140px;z-index:30;display:flex;flex-direction:column;align-items:center;gap:18px}
    .sr-act{display:flex;flex-direction:column;align-items:center;gap:3px}
    .sr-act-btn{width:44px;height:44px;border-radius:50%;background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.16);color:#fff;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;font-family:inherit}
    .sr-act-btn:hover{transform:scale(1.1);background:rgba(0,0,0,0.75)}
    .sr-act-btn.a-liked{background:rgba(239,68,68,0.3);border-color:rgba(239,68,68,0.6);color:#ef4444}
    .sr-act-btn.a-saved{background:rgba(245,158,11,0.3);border-color:rgba(245,158,11,0.6);color:#f59e0b}
    .sr-act-btn.a-followed{background:rgba(16,185,129,0.3);border-color:rgba(16,185,129,0.6);color:#10b981}
    .sr-act-n{font-size:0.67rem;font-weight:700;color:rgba(255,255,255,0.85)}
    .sr-av-btn{width:44px;height:44px;border-radius:50%;border:2.5px solid #fff;display:flex;align-items:center;justify-content:center;font-size:0.82rem;font-weight:900;color:#fff;cursor:pointer;position:relative;flex-shrink:0}
    .sr-av-follow-dot{position:absolute;bottom:-3px;right:-3px;width:17px;height:17px;border-radius:50%;background:#10b981;border:2px solid #000;display:flex;align-items:center;justify-content:center;font-size:0.6rem;font-weight:900;color:#fff;transition:background 0.2s}
    .sr-av-follow-dot.following{background:#3b82f6}

    /* ── BOTTOM CONTENT ───────────────────────────────────────── */
    .sr-content{position:absolute;bottom:0;left:0;right:54px;z-index:30;padding:12px 14px 28px}
    .sr-user-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
    .sr-uname{font-size:0.9rem;font-weight:800;color:#fff}
    .sr-uhandle{font-size:0.73rem;color:rgba(255,255,255,0.55)}
    .sr-verified{font-size:0.7rem;color:#3b82f6}
    .sr-caption{font-size:0.83rem;color:rgba(255,255,255,0.9);line-height:1.5;margin-bottom:9px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
    .sr-caption.expanded{display:block;-webkit-line-clamp:unset}
    .sr-more-cap{font-size:0.78rem;color:rgba(255,255,255,0.45);cursor:pointer;margin-bottom:9px}
    .sr-tags{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:9px}
    .sr-tag{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:100px;font-size:0.7rem;font-weight:600;backdrop-filter:blur(8px)}
    .sr-tag-place{background:rgba(16,185,129,0.2);border:1px solid rgba(16,185,129,0.35);color:#34d399}
    .sr-tag-mood{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.15);color:rgba(255,255,255,0.8)}
    .sr-tag-xp{background:rgba(245,158,11,0.2);border:1px solid rgba(245,158,11,0.35);color:#fcd34d}
    .sr-tag-cam{background:rgba(59,130,246,0.2);border:1px solid rgba(59,130,246,0.35);color:#93c5fd}
    .sr-music-row{display:flex;align-items:center;gap:8px;margin-bottom:11px}
    .sr-music-disc{width:28px;height:28px;border-radius:50%;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:0.72rem;animation:srSpin 5s linear infinite}
    @keyframes srSpin{to{transform:rotate(360deg)}}
    .sr-music-nm{font-size:0.72rem;color:rgba(255,255,255,0.65)}
    .sr-cta-btn{display:flex;align-items:center;justify-content:center;gap:9px;padding:12px 18px;border-radius:12px;font-size:0.83rem;font-weight:800;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s;width:100%}
    .sr-cta-btn:hover{transform:scale(1.02)}
    .sr-cta-green{background:linear-gradient(135deg,#10b981,#059669);color:#fff}
    .sr-cta-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:#fff}
    .sr-cta-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:#000}
    .sr-cta-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff}
    .sr-cta-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:#fff}
    .sr-offer-row{background:rgba(0,0,0,0.55);backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,0.12);border-radius:13px;padding:10px 13px;margin-bottom:9px;display:flex;align-items:center;gap:12px}
    .sr-offer-disc{font-size:1.35rem;font-weight:900;color:#10b981;flex-shrink:0}
    .sr-offer-nm{font-size:0.82rem;font-weight:700;color:#fff;margin-bottom:2px}
    .sr-offer-desc{font-size:0.7rem;color:rgba(255,255,255,0.55)}
    .sr-event-row{background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 13px;margin-bottom:9px;display:flex;align-items:center;gap:10px}
    .sr-event-ico{font-size:1.2rem}
    .sr-event-nm{font-size:0.82rem;font-weight:700;color:#fff;margin-bottom:2px}
    .sr-event-going{font-size:0.69rem;color:rgba(255,255,255,0.55)}
    .sr-ch-row{background:rgba(0,0,0,0.5);backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,0.1);border-radius:12px;padding:10px 13px;margin-bottom:9px}
    .sr-ch-nm{font-size:0.82rem;font-weight:700;color:#fff;margin-bottom:6px}
    .sr-ch-track{height:4px;background:rgba(255,255,255,0.1);border-radius:2px;overflow:hidden}
    .sr-ch-fill{height:100%;background:linear-gradient(to right,#10b981,#34d399);border-radius:2px}
    .sr-ch-meta{display:flex;justify-content:space-between;font-size:0.67rem;color:rgba(255,255,255,0.45);margin-top:5px}

    /* ── EXTERNAL ARROWS (desktop) ────────────────────────────── */
    .sr-ext{position:absolute;left:50%;transform:translateX(-50%);width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#fff;cursor:pointer;font-size:0.88rem;display:none;align-items:center;justify-content:center;transition:all 0.2s;backdrop-filter:blur(8px)}
    .sr-ext:hover{background:rgba(255,255,255,0.18)}
    .sr-ext-up{top:-50px}
    .sr-ext-dn{bottom:-50px}
    @media(min-width:768px){.sr-ext{display:flex}}

    /* ── OVERLAYS ─────────────────────────────────────────────── */
    .sr-ovl{position:fixed;inset:0;z-index:200;background:rgba(0,0,0,0.62);backdrop-filter:blur(4px);opacity:0;pointer-events:none;transition:opacity 0.25s}
    .sr-ovl.open{opacity:1;pointer-events:all}

    /* ── COMMENT DRAWER ───────────────────────────────────────── */
    .sr-drawer{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:540px;z-index:210;max-height:72vh;background:#111827;border-radius:20px 20px 0 0;border-top:1px solid rgba(255,255,255,0.08);transition:transform 0.35s cubic-bezier(.34,1.56,.64,1);display:flex;flex-direction:column}
    .sr-drawer.open{transform:translateX(-50%) translateY(0)}
    .sr-drawer-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.18);margin:12px auto 0;flex-shrink:0}
    .sr-drawer-title{font-size:0.88rem;font-weight:800;color:#f1f5f9;padding:12px 16px 10px;flex-shrink:0;border-bottom:1px solid rgba(255,255,255,0.07)}
    .sr-comments-list{flex:1;overflow-y:auto;padding:12px 16px;scrollbar-width:thin;scrollbar-color:rgba(255,255,255,0.1) transparent}
    .sr-comment{display:flex;gap:10px;margin-bottom:14px}
    .sr-cmnt-av{width:32px;height:32px;border-radius:50%;font-size:0.68rem;font-weight:900;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0}
    .sr-cmnt-nm{font-size:0.77rem;font-weight:700;color:#f1f5f9;margin-bottom:2px}
    .sr-cmnt-txt{font-size:0.79rem;color:#94a3b8;line-height:1.5}
    .sr-cmnt-meta{font-size:0.64rem;color:#4b5563;margin-top:3px}
    .sr-comment-input-row{display:flex;gap:10px;padding:12px 16px;border-top:1px solid rgba(255,255,255,0.07);flex-shrink:0}
    .sr-comment-inp{flex:1;padding:10px 14px;border-radius:100px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);color:#f1f5f9;font-size:0.83rem;font-family:inherit;outline:none}
    .sr-comment-inp:focus{border-color:rgba(16,185,129,0.4)}
    .sr-comment-send{padding:10px 16px;border-radius:100px;background:#10b981;border:none;color:#fff;font-weight:700;font-size:0.82rem;cursor:pointer;font-family:inherit;white-space:nowrap}

    /* ── SHARE PANEL ──────────────────────────────────────────── */
    .sr-share-panel{position:fixed;bottom:0;left:50%;transform:translateX(-50%) translateY(100%);width:100%;max-width:540px;z-index:210;background:#111827;border-radius:20px 20px 0 0;border-top:1px solid rgba(255,255,255,0.08);transition:transform 0.3s cubic-bezier(.34,1.56,.64,1);padding-bottom:max(20px,env(safe-area-inset-bottom))}
    .sr-share-panel.open{transform:translateX(-50%) translateY(0)}
    .sr-share-handle{width:36px;height:4px;border-radius:2px;background:rgba(255,255,255,0.18);margin:12px auto 0}
    .sr-share-ttl{font-size:0.88rem;font-weight:800;color:#f1f5f9;padding:12px 16px 12px;border-bottom:1px solid rgba(255,255,255,0.07)}
    .sr-share-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:2px;padding:14px 12px}
    .sr-share-item{display:flex;flex-direction:column;align-items:center;gap:7px;padding:12px 6px;border-radius:12px;cursor:pointer;transition:background 0.2s}
    .sr-share-item:hover{background:rgba(255,255,255,0.06)}
    .sr-share-ico{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.3rem}
    .sr-share-lbl{font-size:0.68rem;color:#94a3b8;font-weight:500;text-align:center}
    .sr-copy-link{display:flex;align-items:center;gap:12px;padding:12px 16px;cursor:pointer;border-top:1px solid rgba(255,255,255,0.07)}
    .sr-copy-link:hover .sr-copy-lbl{color:#10b981}
    .sr-copy-ico{width:40px;height:40px;border-radius:12px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;color:#94a3b8;font-size:0.9rem;flex-shrink:0}
    .sr-copy-lbl{font-size:0.83rem;font-weight:600;color:#f1f5f9;transition:color 0.2s}

    /* ── TOAST ────────────────────────────────────────────────── */
    .sr-toast{position:fixed;top:70px;left:50%;transform:translateX(-50%) translateY(-8px);background:rgba(16,185,129,0.16);border:1px solid rgba(16,185,129,0.38);color:#34d399;padding:9px 20px;border-radius:100px;font-size:0.81rem;font-weight:700;opacity:0;pointer-events:none;transition:all 0.25s;z-index:500;white-space:nowrap;backdrop-filter:blur(10px)}
    .sr-toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── LIVE PULSE ───────────────────────────────────────────── */
    .sr-live-dot{animation:srPulse 1.5s ease-in-out infinite;display:inline-block}
    @keyframes srPulse{0%,100%{opacity:1}50%{opacity:0.25}}

    /* ── EMPTY STATE ──────────────────────────────────────────── */
    .sr-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:32px;text-align:center}
    .sr-empty-ico{font-size:3rem;opacity:0.4}
    .sr-empty-txt{font-size:0.9rem;color:rgba(255,255,255,0.4);font-weight:600}
  </style>
</head>
<body>

<div class="sr-page">

  <!-- ══ TABS BAR ═════════════════════════════════════════════ -->
  <div class="sr-tabs-bar">
    <a href="feed.html" class="sr-logo-back" title="Back to Feed">
      <i class="fas fa-location-dot"></i>
    </a>
    <div class="sr-tabs-scroll" id="srTabsScroll">
      <button class="sr-tab active" data-tab="foryou">✨ For You</button>
      <button class="sr-tab" data-tab="nearby">📍 Nearby</button>
      <button class="sr-tab" data-tab="events">🎪 Events</button>
      <button class="sr-tab" data-tab="places">🏙️ Places</button>
      <button class="sr-tab" data-tab="creators">🎨 Creators</button>
      <button class="sr-tab" data-tab="challenges">🏆 Challenges</button>
      <button class="sr-tab" data-tab="live">📡 Live</button>
    </div>
    <a href="camera.html?mode=story" title="Create Story" style="flex-shrink:0;width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#10b981,#3b82f6);display:flex;align-items:center;justify-content:center;color:#fff;font-size:0.85rem;text-decoration:none;box-shadow:0 0 12px rgba(16,185,129,0.4)">
      <i class="fas fa-plus"></i>
    </a>
  </div>

  <!-- ══ STAGE ════════════════════════════════════════════════ -->
  <div class="sr-stage">
    <div class="sr-reel-wrap">

      <!-- Prev arrow (desktop) -->
      <button class="sr-ext sr-ext-up" id="srExtUp"><i class="fas fa-chevron-up"></i></button>

      <!-- THE REEL CARD -->
      <div class="sr-reel" id="srReel">

        <!-- Gradient background + emoji -->
        <div class="sr-media" id="srMedia">
          <div class="sr-emoji" id="srEmoji">☕</div>
          <div class="sr-scene" id="srScene"></div>
          <div class="sr-media-noise"></div>
        </div>

        <!-- Vignette -->
        <div class="sr-vignette"></div>

        <!-- Progress bar -->
        <div class="sr-pb-row"><div class="sr-pb-fill" id="srPbFill"></div></div>

        <!-- Top header -->
        <div class="sr-top-hd">
          <a href="feed.html" class="sr-close-btn" id="srClose"><i class="fas fa-times"></i></a>
          <div class="sr-type-chip" id="srTypeChip"></div>
          <button class="sr-more-btn"><i class="fas fa-ellipsis-h"></i></button>
        </div>

        <!-- Navigation tap zones -->
        <div class="sr-nav-l" id="srNavL"></div>
        <div class="sr-nav-r" id="srNavR"></div>

        <!-- Right-side actions -->
        <aside class="sr-side" id="srSide"></aside>

        <!-- Bottom content -->
        <div class="sr-content" id="srContent"></div>

      </div><!-- .sr-reel -->

      <!-- Next arrow (desktop) -->
      <button class="sr-ext sr-ext-dn" id="srExtDn"><i class="fas fa-chevron-down"></i></button>

    </div><!-- .sr-reel-wrap -->
  </div><!-- .sr-stage -->

  <!-- ══ COMMENT DRAWER ═══════════════════════════════════════ -->
  <div class="sr-ovl" id="srDrawerOvl"></div>
  <div class="sr-drawer" id="srDrawer">
    <div class="sr-drawer-handle"></div>
    <div class="sr-drawer-title" id="srDrawerTitle">Comments</div>
    <div class="sr-comments-list" id="srCommentsList"></div>
    <div class="sr-comment-input-row">
      <input class="sr-comment-inp" id="srCommentInp" type="text" placeholder="Add a comment…">
      <button class="sr-comment-send" onclick="window.srSendComment()">Send</button>
    </div>
  </div>

  <!-- ══ SHARE PANEL ══════════════════════════════════════════ -->
  <div class="sr-ovl" id="srShareOvl"></div>
  <div class="sr-share-panel" id="srSharePanel">
    <div class="sr-share-handle"></div>
    <div class="sr-share-ttl">Share this Reel</div>
    <div class="sr-share-grid" id="srShareGrid"></div>
    <div class="sr-copy-link" onclick="window.srCopyLink()">
      <div class="sr-copy-ico"><i class="fas fa-link"></i></div>
      <div class="sr-copy-lbl">Copy link</div>
    </div>
  </div>

  <!-- ══ TOAST ════════════════════════════════════════════════ -->
  <div class="sr-toast" id="srToast"></div>
