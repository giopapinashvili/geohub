<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GeoHub — Get Started</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="components.css">
  <link rel="stylesheet" href="navbar.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="onboarding.css">
</head>
<body class="ob-page">

  <!-- ── HEADER ── -->
  <header class="ob-header">
    <a href="index.html" class="ob-logo">
      <div class="ob-logo-icon">GH</div>
      <span class="ob-logo-text">Geo<span>Hub</span></span>
    </a>
    <div class="ob-progress-track">
      <div class="ob-progress-fill" id="ob-progress-fill"></div>
    </div>
    <div class="ob-step-label" id="ob-step-label"></div>
  </header>

  <!-- ── MAIN CONTENT ── -->
  <main class="ob-main">
    <div class="ob-container">
      <div class="ob-step-content" id="ob-step-content"></div>
    </div>
  </main>

  <!-- ── BOTTOM NAV ── -->
  <div class="ob-nav" id="ob-nav">
    <div class="ob-nav-left">
      <button class="btn btn-ghost" id="ob-back-btn" onclick="obBack()">
        <i class="fas fa-arrow-left"></i> Back
      </button>
      <button class="ob-skip" id="ob-skip-btn" onclick="obSkip()">Skip</button>
    </div>
    <button class="btn btn-primary btn-lg" id="ob-next-btn" onclick="obNext()">
      Continue <i class="fas fa-arrow-right"></i>
    </button>
  </div>

  <!-- ── VALIDATION TOAST ── -->
  <div class="ob-toast" id="ob-toast"></div>

  <script src="mock-users.js"></script>
  <script src="config.js"></script>
  <script src="api-client.js"></script>
  <script src="main.js"></script>
  <script src="account.js"></script>
  <script src="onboarding.js"></script>
</body>
</html>
