<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="icons/icon-96.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Reels — GeoHub</title>
  <meta name="description" content="GeoHub Reels — fullscreen vertical video experience">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
  </noscript>
  <link rel="stylesheet" href="geohub-social-redesign.css">
  <link rel="stylesheet" href="account-switcher.css">
  <link rel="stylesheet" href="chat-popup.css">
  <link rel="stylesheet" href="responsive-polish.css">
  <link rel="stylesheet" href="videos.css">
  <link rel="stylesheet" href="reels.css">
  <meta name="theme-color" content="#000000">
  <script>(function(){try{var t=localStorage.getItem('gh_theme')||'dark';document.documentElement.setAttribute('data-gh-theme',t);}catch(e){document.documentElement.setAttribute('data-gh-theme','dark');}})();</script>
</head>
<body data-gh-page="reels">
  <noscript>GeoHub requires JavaScript.</noscript>

                                    
  <!-- Desktop nav arrows (outside the scroll wrap) -->
  <div class="reels-nav-arrows" id="reelsNavArrows">
    <button class="reel-nav-btn" id="reelNavUp" title="წინა"><i class="fas fa-chevron-up"></i></button>
    <button class="reel-nav-btn" id="reelNavDown" title="შემდეგი"><i class="fas fa-chevron-down"></i></button>
  </div>

  <div class="reels-page" id="reelsPage">
    <div class="reels-wrap" id="reelsWrap">
      <!-- Reel cards injected by reels.js -->
      <div class="reels-loading">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:rgba(255,255,255,.4)"></i>
      </div>
    </div>
  </div>
  <!-- Vite: 19 scripts → 1 chunk. See src/entries/reels.js -->
  <script type="module" src="/src/entries/reels.js"></script>
</body>
</html>
