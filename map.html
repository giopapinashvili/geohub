<div class="map-page-layout">

  <!-- Sidebar -->
  <div class="map-sidebar">
    <div class="map-sidebar-header">
      <h3>🗺️ Explore on Map</h3>
      <div class="map-search" style="position:relative">
        <input type="text" id="mapSearchInput" placeholder="Search places..." autocomplete="off">
        <button><i class="fas fa-search"></i></button>
        <div id="mapSearchDropdown" class="map-search-dropdown"></div>
      </div>
    </div>

    <!-- Category filter chips -->
    <div class="map-filter-chips" id="mapChips">
      <div class="map-chip active" data-cat="">ყველა</div>
    </div>

    <!-- Results list -->
    <div class="map-results" id="mapResults"></div>
  </div>

  <!-- Map Container -->
  <div class="map-container" style="position:relative">
    <div id="map"></div>

    <!-- Floating buttons -->
    <button class="map-toggle-btn" id="legendBtn" onclick="document.getElementById('legend').classList.toggle('open')">
      <i class="fas fa-layer-group"></i> Legend
    </button>

    <!-- Legend — populated dynamically by map.js -->
    <div class="map-legend" id="legend"></div>

    <!-- Count badge -->
    <div class="search-count-badge" id="countBadge">
      Showing <strong id="mapCount">0</strong> places
    </div>

    <!-- Place Info Panel -->
    <div class="map-info-panel" id="infoPanel">
      <div class="panel-close" onclick="closePanel()"><i class="fas fa-times"></i></div>
      <img class="panel-img" id="panelImg" src="" alt="" loading="lazy" decoding="async">
      <div class="panel-img-fallback" id="panelImgFallback" style="display:none"></div>
      <div class="panel-body">
        <div class="panel-title" id="panelTitle"></div>
        <div class="panel-meta">
          <span id="panelCat"></span>
          <span id="panelLoc"></span>
          <span id="panelRating"></span>
        </div>
        <div id="panelDesc" class="panel-desc"></div>
        <div id="panelGoogleSection" style="display:none"></div>
        <div style="display:flex;gap:8px">
          <a id="panelDetailBtn" href="javascript:void(0)" aria-disabled="true" class="btn btn-primary btn-sm" style="flex:1;justify-content:center">
            <i class="fas fa-info-circle"></i> Details
          </a>
          <a id="panelMapBtn" href="javascript:void(0)" aria-disabled="true" class="btn btn-ghost btn-sm" target="_blank">
            <i class="fas fa-directions"></i>
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
