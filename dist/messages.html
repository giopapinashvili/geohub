<body class="page-messages" data-gh-page="messages">
  <nav class="navbar" id="navbar">
    <a href="index.html" class="navbar-brand">
      <div class="logo-icon">🌍</div>
      <span class="logo-text">Geo<span class="logo-geo">Hub</span></span>
    </a>
    <ul class="navbar-links"></ul>
    <div class="navbar-actions">
      <a href="profile.html" class="btn btn-ghost btn-sm"><i class="fas fa-user"></i> Profile</a>
    </div>
    <button class="hamburger" id="geoHamburger" onclick="geoToggleMenu()" aria-label="Menu" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>
  <div class="mobile-menu"></div>

  <div class="messages-page">
    <div class="messages-layout">

      <!-- ===== LEFT SIDEBAR ===== -->
      <div class="msg-sidebar">
        <div class="sidebar-top">
          <div class="sidebar-title">
            <span data-i18n="msg_title">Messages</span>
            <div class="sidebar-title-actions">
              <button class="sidebar-icon-btn" data-i18n-title="msg_new" title="New message" onclick="openNewConversationSearch()"><i class="fas fa-edit"></i></button>
              <button class="sidebar-icon-btn" title="Call History" data-i18n-title="call_history" onclick="GhCallHistory.open()"><i class="fas fa-phone-alt"></i></button>
              <button class="sidebar-icon-btn" title="Group Call" data-i18n-title="group_call_btn" onclick="GhGroupCalls.openInviteModal()"><i class="fas fa-users"></i></button>
              <button class="sidebar-icon-btn" title="Join Group Call" data-i18n-title="group_call_join" onclick="GhGroupCalls.openJoinDialog()"><i class="fas fa-sign-in-alt"></i></button>
              <button class="sidebar-icon-btn" title="Filter" data-i18n-title="msg_filter"><i class="fas fa-sliders-h"></i></button>
            </div>
          </div>
          <div class="conv-search-wrap">
            <i class="fas fa-search"></i>
            <input type="text" class="conv-search" data-i18n-placeholder="msg_search_convs" placeholder="Search conversations…" oninput="searchConvs(this.value)">
          </div>
          <div class="filter-tabs">
            <button class="filter-tab active" onclick="setFilter('all',this)" data-i18n="msg_all">All</button>
            <button class="filter-tab" onclick="setFilter('unread',this)" data-i18n="msg_unread">Unread</button>
          </div>
        </div>
        <div class="conv-list" id="convList"></div>
      </div>

      <!-- ===== CHAT WINDOW ===== -->
      <div class="chat-window">
        <div class="chat-header" id="chatHeader">
          <div style="color:var(--text-muted);font-size:0.85rem;padding:0 16px" data-i18n="msg_select_conv">Select a conversation</div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>

        <!-- Typing indicator -->
        <div class="typing-row" style="padding:0 16px 4px">
          <div class="msg-av-col"></div>
          <div id="typingIndicator">
            <div class="typing-bubble">
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
              <div class="typing-dot"></div>
            </div>
          </div>
        </div>

        <!-- Message search bar -->
        <div class="msg-search-wrap" id="msgSearchWrap" style="display:none">
          <i class="fas fa-search"></i>
          <input type="text" id="msgSearchInput" class="msg-search-input" data-i18n-placeholder="msg_search_msgs" placeholder="Search messages…">
          <button class="msg-search-close" type="button" onclick="window.__ghToggleSearch()"><i class="fas fa-times"></i></button>
        </div>

        <!-- Reply preview bar -->
        <div class="reply-preview-bar" id="replyPreviewBar" style="display:none"></div>

        <!-- Quick replies -->
        <div class="quick-replies-bar" id="quickRepliesBar" style="display:none"></div>

        <!-- Input bar -->
        <div class="chat-input-bar">
          <button class="input-btn attach-menu-btn" id="attachmentMenuBtn" title="Attachments" data-i18n-title="msg_attachments" aria-label="Attachments" aria-expanded="false" onclick="window.__ghToggleAttachSheet&&window.__ghToggleAttachSheet(event)"><i class="fas fa-plus"></i></button>
          <input type="text" id="msgInput" class="msg-input" data-i18n-placeholder="msg_type_msg" placeholder="Type a message…">
          <button class="input-btn" id="emojiBtn" title="Emoji" data-i18n-title="msg_emoji" onclick="toggleEmojiPicker()"><i class="fas fa-smile"></i></button>
          <button class="send-btn" onclick="sendMsg()" title="Send" data-i18n-title="msg_send"><i class="fas fa-paper-plane"></i></button>
          <div class="msg-attach-sheet" id="msgAttachSheet" aria-hidden="true">
            <button type="button" data-pick-image><i class="fas fa-image"></i><span data-i18n="msg_photo">Photo</span></button>
            <button type="button" id="fileAttachBtn"><i class="fas fa-file-alt"></i><span data-i18n="msg_file">File</span></button>
            <button type="button" id="voiceBtn"><i class="fas fa-microphone"></i><span data-i18n="msg_voice">Voice</span></button>
          </div>
          <div class="emoji-picker-wrap" id="emojiPicker"></div>
          <input id="messageImageInput" type="file" accept="image/*" hidden>
          <input id="messageFileInput" type="file" accept=".pdf,.doc,.docx,.txt,.xls,.xlsx,.csv" hidden>
        </div>
      </div>

      <!-- ===== INFO PANEL ===== -->
      <div class="info-panel" id="infoPanel">
        <div class="info-scroll">
          <div style="color:var(--text-muted);text-align:center;padding:40px 16px;font-size:0.85rem" data-i18n="msg_conv_details">Select a conversation to see details</div>
        </div>
      </div>

    </div>
  </div>


  <div id="newConversationModal" class="msg-modal" hidden>
    <div class="msg-modal-card">
      <button class="msg-modal-close" type="button" onclick="closeNewConversationSearch()">×</button>
      <h3 data-i18n="msg_start_conv">Start a conversation</h3>
      <p data-i18n="msg_start_sub">Search real users and open a chat.</p>
      <input id="newConversationSearch" class="msg-input" data-i18n-placeholder="msg_search_user" placeholder="Search by name or email…" oninput="searchNewConversationUsers(this.value)">
      <div id="newConversationResults" class="new-conversation-results"></div>
    </div>
  </div>

  <div id="msgToast" class="msg-toast"></div>

  <!-- Vite: 25 scripts bundled → 1 optimised chunk. See src/entries/messages.js -->
</body>
