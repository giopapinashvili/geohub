<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="icons/icon-96.png">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>

  <title>Page Not Found — GeoHub</title>
  <script>(function(){try{var t=localStorage.getItem('gh_theme')||'dark';document.documentElement.setAttribute('data-gh-theme',t);}catch(e){document.documentElement.setAttribute('data-gh-theme','dark');}})();</script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#04050d;--card:#0c0e1c;--green:#10b981;--green-dim:#0d9268;
      --text:#f0f4ff;--muted:#6b7280;--border:rgba(255,255,255,.08);
    }
    html[data-gh-theme="light"]{
      --bg:#f8faf9;--card:#ffffff;--text:#0f172a;--muted:#64748b;--border:rgba(0,0,0,.08);
    }
    html,body{height:100%;background:var(--bg);color:var(--text);font-family:Inter,system-ui,-apple-system,sans-serif;}
    body{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100dvh;padding:24px;text-align:center;}

    .logo{font-size:1.4rem;font-weight:900;letter-spacing:-.03em;color:var(--text);margin-bottom:40px;}
    .logo span{color:var(--green)}
    .logo a{text-decoration:none;color:inherit}

    .code{
      font-size:7rem;font-weight:900;letter-spacing:-.05em;
      background:linear-gradient(135deg,var(--green),#3b82f6);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;
      line-height:1;margin-bottom:16px;
    }
    h1{font-size:1.6rem;font-weight:800;letter-spacing:-.03em;margin-bottom:10px;color:var(--text)}
    p{font-size:0.95rem;color:var(--muted);line-height:1.6;max-width:340px;margin:0 auto 32px}

    .actions{display:flex;flex-wrap:wrap;gap:12px;justify-content:center}
    .btn-primary{
      display:inline-flex;align-items:center;gap:8px;
      background:var(--green);color:#fff;border:none;
      padding:12px 28px;border-radius:12px;font-size:0.9rem;font-weight:700;
      cursor:pointer;transition:background .2s;text-decoration:none;
    }
    .btn-primary:hover{background:var(--green-dim)}
    .btn-ghost{
      display:inline-flex;align-items:center;gap:8px;
      border:1px solid var(--border);color:var(--muted);
      padding:12px 24px;border-radius:12px;font-size:0.9rem;font-weight:600;
      text-decoration:none;transition:border-color .2s,color .2s;
    }
    .btn-ghost:hover{border-color:var(--green);color:var(--green)}

    .quick-links{margin-top:40px;display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
    .quick-link{
      background:var(--card);border:1px solid var(--border);
      border-radius:10px;padding:8px 14px;font-size:0.78rem;font-weight:600;
      color:var(--muted);text-decoration:none;transition:border-color .2s,color .2s;
    }
    .quick-link:hover{border-color:var(--green);color:var(--green)}
  </style>
</head>
<body>
  <div class="logo"><a href="/index.html">Geo<span>Hub</span></a></div>

  <div class="code">404</div>

  <h1>Page not found</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>

  <div class="actions">
    <a class="btn-primary" href="/index.html">
      <svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
      Go Home
    </a>
    <a class="btn-ghost" href="javascript:history.back()">← Go Back</a>
  </div>

  <div class="quick-links">
    <a class="quick-link" href="/feed.html">Explore</a>
    <a class="quick-link" href="/map.html">Map</a>
    <a class="quick-link" href="/events.html">Events</a>
    <a class="quick-link" href="/places.html">Places</a>
    <a class="quick-link" href="/groups.html">Groups</a>
    <a class="quick-link" href="/rewards.html">Rewards</a>
    <a class="quick-link" href="/search.html">Search</a>
  </div>
</body>
</html>
