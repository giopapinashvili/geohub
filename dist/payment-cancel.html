<!DOCTYPE html>
<html lang="ka">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/png" href="icons/icon-96.png">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <link rel="dns-prefetch" href="https://firestore.googleapis.com">
  <link rel="dns-prefetch" href="https://firebase.googleapis.com">
  <link rel="dns-prefetch" href="https://identitytoolkit.googleapis.com">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Payment Cancelled — GeoHub</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/brands.min.css"></noscript>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      background: radial-gradient(ellipse at 20% 20%, rgba(239,68,68,.1), transparent 40%),
                  #04050d;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #e2e8f0;
      padding: 24px;
    }
    .card {
      background: rgba(255,255,255,.05); border: 1px solid rgba(255,255,255,.1);
      border-radius: 24px; padding: 40px 32px; max-width: 420px; width: 100%; text-align: center;
      box-shadow: 0 32px 80px rgba(0,0,0,.5);
    }
    .icon-wrap {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(239,68,68,.15); border: 1px solid rgba(239,68,68,.3);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px; font-size: 1.8rem; color: #ef4444;
    }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p  { color: #94a3b8; line-height: 1.6; font-size: .9rem; margin-bottom: 24px; }
    .actions { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px; text-decoration: none;
      padding: 12px 22px; border-radius: 12px; font-weight: 700; font-size: .88rem;
      cursor: pointer; border: none; transition: opacity .2s;
    }
    .btn-primary { background: linear-gradient(135deg,#10b981,#059669); color: #fff; }
    .btn-ghost   { background: rgba(255,255,255,.07); color: #94a3b8; border: 1px solid rgba(255,255,255,.1); }
    .btn:hover   { opacity: .85; }
    small { display: block; color: #475569; font-size: .75rem; margin-top: 20px; }
  </style>
</head>
<body>
<div class="card">
  <div class="icon-wrap"><i class="fas fa-times"></i></div>
  <h1>Payment cancelled</h1>
  <p>No charge was made. You can go back and try again whenever you're ready.</p>
  <div class="actions" id="actions">
    <a href="events.html" class="btn btn-primary"><i class="fas fa-calendar"></i> Back to Events</a>
    <a href="feed.html"   class="btn btn-ghost"><i class="fas fa-house"></i> Home</a>
  </div>
  <small>Questions? Contact us at support@geohub.ge</small>
</div>
<script>
  (function () {
    var type = new URLSearchParams(location.search).get('type');
    if (type === 'subscription') {
      document.getElementById('actions').innerHTML = [
        '<a href="dashboard.html" class="btn btn-primary"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>',
        '<a href="feed.html" class="btn btn-ghost"><i class="fas fa-house"></i> Home</a>',
      ].join('');
    }
  })();
</script>
</body>
</html>
