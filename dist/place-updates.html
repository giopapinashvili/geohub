<!DOCTYPE html><html lang="ka"><head><meta charset="UTF-8">
  <link rel="icon" type="image/png" href="icons/icon-96.png">
  <link rel="preconnect" href="https://www.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#10b981">
  <title>ადგილის სიახლეები — GeoHub</title>
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <link rel="preload" as="style" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/fontawesome.min.css"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/solid.min.css"></noscript>
<style>
.pu-page{max-width:760px;margin:0 auto;padding:24px 16px 120px}
.pu-header{margin-bottom:24px}
.pu-title{font-size:1.5rem;font-weight:900;color:var(--gh-text,#f9fafb);margin-bottom:4px}
.pu-sub{color:var(--gh-muted,#64748b);font-size:.88rem}
.pu-filters{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:20px;scrollbar-width:none}
.pu-filters::-webkit-scrollbar{display:none}
.pu-filter-btn{flex-shrink:0;padding:8px 16px;border-radius:999px;border:1px solid var(--gh-border,#374151);background:var(--gh-card,rgba(13,22,19,.92));color:var(--gh-text,#f9fafb);font-size:.82rem;font-weight:700;cursor:pointer;transition:.15s}
.pu-filter-btn.active{background:var(--gh-green,#10b981);border-color:var(--gh-green,#10b981);color:#fff}
.pu-list{display:grid;gap:14px}
.pu-card{background:var(--gh-card,rgba(13,22,19,.92));border:1px solid var(--gh-border,#374151);border-radius:18px;overflow:hidden;transition:border-color .15s}
.pu-card:hover{border-color:rgba(16,185,129,.4)}
.pu-card-img{width:100%;height:180px;object-fit:cover;display:block;background:var(--gh-bg,#050807)}
.pu-card-img-placeholder{width:100%;height:180px;background:linear-gradient(135deg,rgba(16,185,129,.1),rgba(59,130,246,.1));display:flex;align-items:center;justify-content:center;color:var(--gh-muted,#64748b);font-size:2rem}
.pu-card-body{padding:16px}
.pu-card-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.pu-card-place{font-weight:800;font-size:.82rem;color:var(--gh-green,#10b981);text-decoration:none}
.pu-card-place:hover{text-decoration:underline}
.pu-card-cat{padding:3px 10px;border-radius:999px;font-size:.7rem;font-weight:700;background:rgba(16,185,129,.12);color:var(--gh-green,#10b981);border:1px solid rgba(16,185,129,.2)}
.pu-card-time{font-size:.72rem;color:var(--gh-muted,#64748b);margin-left:auto}
.pu-card-title{font-weight:800;font-size:1rem;color:var(--gh-text,#f9fafb);margin-bottom:6px;line-height:1.3}
.pu-card-desc{font-size:.84rem;color:var(--gh-muted,#94a3b8);line-height:1.55;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden}
.pu-card-footer{display:flex;align-items:center;gap:12px;margin-top:14px;padding-top:12px;border-top:1px solid var(--gh-border,#374151)}
.pu-card-av{width:28px;height:28px;border-radius:50%;object-fit:cover;background:var(--gh-green,#10b981);flex-shrink:0}
.pu-card-av-fb{width:28px;height:28px;border-radius:50%;background:var(--gh-green,#10b981);display:flex;align-items:center;justify-content:center;font-weight:900;font-size:.78rem;color:#fff;flex-shrink:0}
.pu-card-author{font-size:.78rem;color:var(--gh-muted,#94a3b8)}
.pu-card-btn{margin-left:auto;padding:6px 14px;border-radius:10px;border:1px solid var(--gh-border,#374151);background:transparent;color:var(--gh-text,#f9fafb);font-size:.78rem;font-weight:700;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:6px;transition:.15s}
.pu-card-btn:hover{border-color:var(--gh-green,#10b981);color:var(--gh-green,#10b981)}
.pu-empty{padding:64px 24px;text-align:center;color:var(--gh-muted,#64748b);border:1px dashed var(--gh-border,#374151);border-radius:22px}
.pu-empty i{font-size:2.5rem;color:var(--gh-green,#10b981);margin-bottom:14px;display:block;opacity:.5}
.pu-empty h3{color:var(--gh-text,#f9fafb);margin-bottom:6px}
.pu-skeleton{background:linear-gradient(90deg,var(--gh-border,#374151) 25%,rgba(148,163,184,.08) 50%,var(--gh-border,#374151) 75%);background-size:200% 100%;animation:pusk 1.4s infinite;border-radius:10px}
@keyframes pusk{0%{background-position:200% 0}100%{background-position:-200% 0}}
.pu-skel-card{background:var(--gh-card,rgba(13,22,19,.92));border:1px solid var(--gh-border,#374151);border-radius:18px;overflow:hidden;margin-bottom:14px}
</style>
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="geohub-social-redesign.css">
  <link rel="stylesheet" href="chat-popup.css">
  <link rel="stylesheet" href="responsive-polish.css">
  <script>(function(){try{var t=localStorage.getItem('gh_theme')||'dark';document.documentElement.setAttribute('data-gh-theme',t);}catch(e){document.documentElement.setAttribute('data-gh-theme','dark');}})();</script>
</head><body class="page-place-updates">

<script src="firebase-init.js" defer></script>
<script src="geohub-social-redesign.js" defer></script>
<script src="chat-popup.js" defer></script>
<script>
document.addEventListener('DOMContentLoaded', function() {
  if (window.GeoHub && window.GeoHub.shell) {
    window.GeoHub.shell({ active: 'place-updates', center:
      '<div class="pu-page">' +
        '<div class="pu-header">' +
          '<div class="pu-title"><i class="fas fa-bullhorn" style="color:var(--gh-green);margin-right:8px"></i>ადგილის სიახლეები</div>' +
          '<div class="pu-sub">ბიზნესებისა და ადგილების უახლესი განახლებები</div>' +
        '</div>' +
        '<div class="pu-filters" id="puFilters">' +
          '<button class="pu-filter-btn active" data-cat="all">ყველა</button>' +
          '<button class="pu-filter-btn" data-cat="offer">🏷️ აქცია</button>' +
          '<button class="pu-filter-btn" data-cat="event">🎉 ღონისძიება</button>' +
          '<button class="pu-filter-btn" data-cat="news">📢 სიახლე</button>' +
          '<button class="pu-filter-btn" data-cat="menu">🍽️ მენიუ</button>' +
          '<button class="pu-filter-btn" data-cat="hours">🕐 სამუშაო საათები</button>' +
        '</div>' +
        '<div class="pu-list" id="puList">' +
          '<div class="pu-skel-card"><div class="pu-skeleton" style="height:180px;border-radius:0"></div><div style="padding:16px"><div class="pu-skeleton" style="height:14px;width:40%;margin-bottom:10px"></div><div class="pu-skeleton" style="height:18px;margin-bottom:8px"></div><div class="pu-skeleton" style="height:12px;width:80%;margin-bottom:6px"></div><div class="pu-skeleton" style="height:12px;width:60%"></div></div></div>' +
          '<div class="pu-skel-card"><div class="pu-skeleton" style="height:180px;border-radius:0"></div><div style="padding:16px"><div class="pu-skeleton" style="height:14px;width:40%;margin-bottom:10px"></div><div class="pu-skeleton" style="height:18px;margin-bottom:8px"></div><div class="pu-skeleton" style="height:12px;width:80%;margin-bottom:6px"></div><div class="pu-skeleton" style="height:12px;width:60%"></div></div></div>' +
        '</div>' +
      '</div>'
    });
  }

  // Load updates after shell is ready
  setTimeout(loadPlaceUpdates, 300);
});

var _puCat = 'all';
var _puAllUpdates = [];

function loadPlaceUpdates() {
  var GF = window.GeoFirebase;
  if (!GF || !GF.fs || !GF.db) {
    document.getElementById('puList').innerHTML =
      '<div class="pu-empty"><i class="fas fa-bullhorn"></i><h3>სიახლეები ჯერ არ არის</h3><p>ბიზნესები და ადგილები სიახლეებს აქ გამოაქვეყნებენ.</p></div>';
    return;
  }
  GF.fs.getDocs(GF.fs.query(
    GF.fs.collection(GF.db, 'placeUpdates'),
    GF.fs.orderBy('createdAt', 'desc'),
    GF.fs.limit(40)
  )).then(function(snap) {
    _puAllUpdates = [];
    snap.forEach(function(d) { _puAllUpdates.push(Object.assign({ id: d.id }, d.data())); });
    renderUpdates();
    setupFilters();
  }).catch(function() {
    document.getElementById('puList').innerHTML =
      '<div class="pu-empty"><i class="fas fa-bullhorn"></i><h3>სიახლეები ჯერ არ არის</h3><p>ბიზნესები და ადგილები სიახლეებს აქ გამოაქვეყნებენ.</p></div>';
  });
}

function renderUpdates() {
  var list = document.getElementById('puList');
  if (!list) return;
  var items = _puCat === 'all' ? _puAllUpdates : _puAllUpdates.filter(function(u) { return u.category === _puCat; });
  if (!items.length) {
    list.innerHTML = '<div class="pu-empty"><i class="fas fa-bullhorn"></i><h3>სიახლეები ჯერ არ არის</h3><p>ამ კატეგორიაში განახლება არ არის.</p></div>';
    return;
  }
  list.innerHTML = items.map(function(u) {
    var imgHtml = u.image
      ? '<img class="pu-card-img" src="' + esc(u.image) + '" alt="" loading="lazy">'
      : '<div class="pu-card-img-placeholder"><i class="fas fa-bullhorn"></i></div>';
    var catLabel = { offer:'🏷️ აქცია', event:'🎉 ღონისძიება', news:'📢 სიახლე', menu:'🍽️ მენიუ', hours:'🕐 სამუშ. საათები' }[u.category] || '📌 სიახლე';
    var timeAgo = u.createdAt ? relTime(u.createdAt.toDate ? u.createdAt.toDate() : new Date(u.createdAt)) : '';
    var avHtml = u.placeAvatar
      ? '<img class="pu-card-av" src="' + esc(u.placeAvatar) + '" alt="">'
      : '<div class="pu-card-av-fb">' + esc((u.placeName || 'P').charAt(0)) + '</div>';
    return '<div class="pu-card">' +
      imgHtml +
      '<div class="pu-card-body">' +
        '<div class="pu-card-meta">' +
          '<a class="pu-card-place" href="place.html?id=' + esc(u.placeId || '') + '">' + esc(u.placeName || 'ადგილი') + '</a>' +
          '<span class="pu-card-cat">' + catLabel + '</span>' +
          '<span class="pu-card-time">' + timeAgo + '</span>' +
        '</div>' +
        '<div class="pu-card-title">' + esc(u.title || '') + '</div>' +
        '<div class="pu-card-desc">' + esc(u.body || '') + '</div>' +
        '<div class="pu-card-footer">' +
          avHtml +
          '<span class="pu-card-author">' + esc(u.placeName || '') + '</span>' +
          (u.placeId ? '<a class="pu-card-btn" href="place.html?id=' + esc(u.placeId) + '"><i class="fas fa-arrow-right"></i> ადგილი</a>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function setupFilters() {
  var btns = document.querySelectorAll('.pu-filter-btn');
  btns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      btns.forEach(function(b) { b.classList.remove('active'); });
      btn.classList.add('active');
      _puCat = btn.dataset.cat;
      renderUpdates();
    });
  });
}

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

function relTime(d) {
  var diff = Math.floor((Date.now() - d.getTime()) / 1000);
  if (diff < 60) return 'ახლა';
  if (diff < 3600) return Math.floor(diff/60) + ' წთ წინ';
  if (diff < 86400) return Math.floor(diff/3600) + ' სთ წინ';
  return Math.floor(diff/86400) + ' დ წინ';
}
</script>
</body></html>
